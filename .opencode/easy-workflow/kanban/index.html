// ---- Execution ----
async function toggleExecution() {
  try {
    if (isExecuting) {
      await api('/api/stop', 'POST')
    } else {
      const showGraph = document.getElementById('showGraphChk').checked
      if (showGraph) {
        await openGraphModal()
      } else {
        await api('/api/start', 'POST')
      }
    }
  } catch (e) { showToast('Execution control failed: ' + e.message, 'error') }
}

async function openGraphModal() {
  try {
    const data = await api('/api/execution-graph')
    if (data.error) {
      showToast(data.error, 'error')
      return
    }
    renderGraphModal(data)
    document.getElementById('graphModal').classList.remove('hidden')
  } catch (e) { showToast('Failed to load execution graph: ' + e.message, 'error') }
}

function closeGraphModal() {
  document.getElementById('graphModal').classList.add('hidden')
}

function renderGraphModal(graph) {
  const container = document.getElementById('graphContent')
  container.innerHTML = ''

   const nodes = Array.isArray(graph.nodes) ? graph.nodes : []
   const totalWorkerRuns = nodes.reduce((sum, node) => sum + (node.expandedWorkerRuns ?? 1), 0)
   const totalReviewerRuns = nodes.reduce((sum, node) => sum + (node.expandedReviewerRuns ?? 0), 0)
   const totalFinalApplierRuns = nodes.reduce((sum, node) => sum + (node.hasFinalApplier ? 1 : 0), 0)
   const totalInternalRuns = nodes.reduce((sum, node) => sum + (node.estimatedRunCount ?? 1), 0)

  const summary = document.createElement('div')
  summary.style.cssText = 'margin-bottom:16px;font-size:13px;color:var(--text-dim);'
  summary.textContent = `${graph.totalTasks} task${graph.totalTasks !== 1 ? 's' : ''} in ${graph.batches.length} batch${graph.batches.length !== 1 ? 'es' : ''} (parallel limit: ${graph.parallelLimit})`
  container.appendChild(summary)

  const runSummary = document.createElement('div')
  runSummary.style.cssText = 'margin-bottom:16px;font-size:13px;color:var(--text-dim);padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);'
  runSummary.textContent = `${graph.totalTasks} logical task${graph.totalTasks !== 1 ? 's' : ''}, ${totalWorkerRuns} worker run${totalWorkerRuns !== 1 ? 's' : ''}, ${totalReviewerRuns} reviewer run${totalReviewerRuns !== 1 ? 's' : ''}, ${totalFinalApplierRuns} final applier run${totalFinalApplierRuns !== 1 ? 's' : ''} (${totalInternalRuns} total internal run${totalInternalRuns !== 1 ? 's' : ''})`
  container.appendChild(runSummary)

  if (totalInternalRuns > 10) {
    const warning = document.createElement('div')
    warning.style.cssText = 'margin-bottom:16px;font-size:12px;color:var(--yellow);padding:10px;border:1px solid rgba(210,153,34,.45);border-radius:8px;background:rgba(210,153,34,.12);'
    warning.textContent = `Warning: this run plan expands to ${totalInternalRuns} internal runs and may increase cost and total runtime.`
    container.appendChild(warning)
  }

  const batchesList = document.createElement('div')
  batchesList.style.cssText = 'display:flex;flex-direction:column;gap:12px;'
  
  for (const batch of graph.batches) {
    const batchDiv = document.createElement('div')
    batchDiv.style.cssText = 'border:1px solid var(--border);border-radius:8px;padding:12px;background:var(--bg);'
    
    const batchHeader = document.createElement('div')
    batchHeader.style.cssText = 'font-size:12px;font-weight:600;color:var(--accent);margin-bottom:8px;'
    batchHeader.textContent = `Batch ${batch.idx + 1} (${batch.taskNames.length} task${batch.taskNames.length !== 1 ? 's' : ''})`
    batchDiv.appendChild(batchHeader)

    const taskList = document.createElement('div')
    taskList.style.cssText = 'display:flex;flex-direction:column;gap:6px;'
    
    for (let i = 0; i < batch.taskNames.length; i++) {
      const taskName = batch.taskNames[i]
      const taskId = batch.taskIds[i]
      const node = nodes.find(n => n.id === taskId)
      const taskItem = document.createElement('div')
      taskItem.style.cssText = 'display:flex;align-items:center;gap:8px;padding:4px 0;'
      
      const arrow = document.createElement('span')
      arrow.style.cssText = 'color:var(--text-dim);font-size:12px;'
      arrow.textContent = '\u25B6'
      taskItem.appendChild(arrow)
      
      const name = document.createElement('span')
      name.style.cssText = 'font-size:13px;'
      name.textContent = taskName
      taskItem.appendChild(name)

      if (node && node.hasFinalApplier) {
        const details = document.createElement('span')
        details.style.cssText = 'font-size:11px;color:var(--text-dim);'
        details.textContent = `(workers: ${node.expandedWorkerRuns || 0}, reviewers: ${node.expandedReviewerRuns || 0}, final applier: 1)`
        taskItem.appendChild(details)
      }
      
      taskList.appendChild(taskItem)
    }
    batchDiv.appendChild(taskList)
    batchesList.appendChild(batchDiv)
  }
  container.appendChild(batchesList)

  const pendingApprovals = graph.pendingApprovals || []
  if (pendingApprovals.length > 0) {
    const pendingDiv = document.createElement('div')
    pendingDiv.style.cssText = 'margin-top:16px;border:1px solid var(--green);border-radius:8px;padding:12px;background:rgba(63,185,80,.08);'
    
    const pendingHeader = document.createElement('div')
    pendingHeader.style.cssText = 'font-size:12px;font-weight:600;color:var(--green);margin-bottom:8px;'
    pendingHeader.textContent = `Pending Approvals (${pendingApprovals.length})`
    pendingDiv.appendChild(pendingHeader)

    const pendingList = document.createElement('div')
    pendingList.style.cssText = 'display:flex;flex-direction:column;gap:6px;'
    
    for (const task of pendingApprovals) {
      const taskItem = document.createElement('div')
      taskItem.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:8px;padding:4px 0;'
      
      const taskInfo = document.createElement('div')
      taskInfo.style.cssText = 'display:flex;align-items:center;gap:8px;'
      
      const arrow = document.createElement('span')
      arrow.style.cssText = 'color:var(--green);font-size:12px;'
      arrow.textContent = '\u25B6'
      taskInfo.appendChild(arrow)
      
      const name = document.createElement('span')
      name.style.cssText = 'font-size:13px;'
      name.textContent = task.name + (task.planRevisionCount > 0 ? ` (rev ${task.planRevisionCount})` : '')
      taskInfo.appendChild(name)
      
      taskItem.appendChild(taskInfo)
      
      const btnGroup = document.createElement('div')
      btnGroup.style.cssText = 'display:flex;gap:4px;'

      const approveBtn = document.createElement('button')
      approveBtn.className = 'btn btn-sm'
      approveBtn.style.cssText = 'border-color:var(--green);color:var(--green);'
      approveBtn.textContent = 'Approve'
      approveBtn.onclick = () => openApproveModal(task.id)
      btnGroup.appendChild(approveBtn)

      const revisionBtn = document.createElement('button')
      revisionBtn.className = 'btn btn-sm'
      revisionBtn.style.cssText = 'border-color:var(--orange);color:var(--orange);'
      revisionBtn.textContent = 'Request Changes'
      revisionBtn.onclick = () => openRevisionModal(task.id)
      btnGroup.appendChild(revisionBtn)

      taskItem.appendChild(btnGroup)
      
      pendingList.appendChild(taskItem)
    }
    pendingDiv.appendChild(pendingList)
    container.appendChild(pendingDiv)
  }
}

async function confirmExecution() {
  closeGraphModal()
  document.getElementById('showGraphChk').checked = false
  try {
    await api('/api/start', 'POST')
  } catch (e) { showToast('Execution start failed: ' + e.message, 'error') }
}

let bonDetailModal = null

async function openBestOfNDetailModal(taskId) {
  if (!bonDetailModal) {
    bonDetailModal = document.createElement('div')
    bonDetailModal.className = 'modal-overlay hidden'
    bonDetailModal.id = 'bonDetailModal'
    bonDetailModal.innerHTML = `
      <div class="modal" style="width:700px;max-height:85vh;">
        <div class="modal-header">
          <h2>Best-of-N Details</h2>
          <button class="modal-close" onclick="closeBonDetailModal()">&times;</button>
        </div>
        <div class="modal-body" id="bonDetailBody">
          <div id="bonDetailContent"></div>
        </div>
        <div class="modal-footer">
          <button class="btn" onclick="closeBonDetailModal()">Close</button>
        </div>
      </div>
    `
    document.body.appendChild(bonDetailModal)
  }
  
  await refreshBonDetailModal(taskId)
  bonDetailModal.classList.remove('hidden')
}

function closeBonDetailModal() {
  if (bonDetailModal) bonDetailModal.classList.add('hidden')
}

async function refreshBonDetailModal(taskId) {
  const task = allTasks.find(t => t.id === taskId)
  if (!task) return
  
  const content = document.getElementById('bonDetailContent')
  
  try {
    const [runs, candidates, summary] = await Promise.all([
      api(`/api/tasks/${taskId}/runs`),
      api(`/api/tasks/${taskId}/candidates`),
      api(`/api/tasks/${taskId}/best-of-n-summary`),
    ])
    
    const statusMap = {
      'pending': 'pending',
      'running': 'running',
      'done': 'done',
      'failed': 'failed',
      'skipped': 'skipped',
    }
    
    const workers = runs.filter(r => r.phase === 'worker')
    const reviewers = runs.filter(r => r.phase === 'reviewer')
    const finalApplier = runs.filter(r => r.phase === 'final_applier')
    
    const renderRun = (run, phaseClass, title) => `
      <div class="run-item">
        <div class="run-item-header">
          <span class="run-item-phase ${phaseClass}">${title}</span>
          <span class="run-item-model">${run.model}</span>
          <span class="run-item-status ${statusMap[run.status] || 'pending'}">${run.status}</span>
        </div>
        ${run.summary ? `<div class="run-item-summary">${run.summary.substring(0, 300)}</div>` : ''}
        ${run.errorMessage ? `<div class="run-item-summary" style="color:var(--red);">Error: ${run.errorMessage}</div>` : ''}
        ${run.worktreeDir ? `<div class="run-item-summary">Worktree: ${run.worktreeDir}</div>` : ''}
        ${run.sessionUrl ? `<div class="run-item-actions"><a href="${run.sessionUrl}" target="_blank" class="btn btn-sm">Open Session</a></div>` : ''}
      </div>
    `

    const workerRows = workers.map((w) => renderRun(w, 'worker', `Worker Slot ${w.slotIndex + 1}`)).join('')
      || '<div class="run-item-summary">No worker runs yet.</div>'
    const reviewerRows = reviewers.map((r) => renderRun(r, 'reviewer', `Reviewer Slot ${r.slotIndex + 1}`)).join('')
      || '<div class="run-item-summary">No reviewer runs yet.</div>'
    const finalRows = finalApplier.map((f) => renderRun(f, 'final_applier', 'Final Applier')).join('')
      || '<div class="run-item-summary">Final applier has not started yet.</div>'
    const candidateRows = candidates.map((c) => `
      <div class="candidate-item ${c.status === 'selected' ? 'selected' : ''}">
        <div class="candidate-header">
          <span class="candidate-id">${c.id}</span>
          <span class="run-item-status ${c.status === 'selected' ? 'done' : 'pending'}">${c.status}</span>
        </div>
        ${c.summary ? `<div class="run-item-summary">${c.summary.substring(0, 300)}</div>` : '<div class="run-item-summary">No summary</div>'}
        <div class="candidate-files">Files: ${(c.changedFilesJson || []).join(', ') || 'None'}</div>
      </div>
    `).join('') || '<div class="run-item-summary">No successful candidates yet.</div>'

    let html = `
      <div style="margin-bottom:16px;">
        <strong>Task:</strong> ${task.name}<br>
        <strong>Substage:</strong> ${task.bestOfNSubstage || 'idle'}<br>
        <strong>Successful Workers:</strong> ${summary.successfulCandidateCount || 0} / ${summary.expandedWorkerCount || 0}
      </div>
      
      <div class="modal-detail-tabs">
        <button class="modal-detail-tab active" onclick="showBonTab('overview', '${taskId}')">Overview</button>
        <button class="modal-detail-tab" onclick="showBonTab('workers', '${taskId}')">Workers (${workers.length})</button>
        <button class="modal-detail-tab" onclick="showBonTab('reviewers', '${taskId}')">Reviewers (${reviewers.length})</button>
        <button class="modal-detail-tab" onclick="showBonTab('final', '${taskId}')">Final Applier (${finalApplier.length})</button>
      </div>
      
      <div id="bonTabContent">
        <div id="bonTab-overview" style="display:block;">
          <h4 style="margin-bottom:12px;">Execution Summary</h4>
          <div class="run-item-summary" style="margin-bottom:12px;">
            Workers completed: ${summary.workersDone || 0}/${summary.workersTotal || 0}<br>
            Reviewers completed: ${summary.reviewersDone || 0}/${summary.reviewersTotal || 0}<br>
            Final applier completed: ${summary.finalApplierDone ? 'yes' : 'no'}
          </div>
          <h4 style="margin-bottom:8px;">Candidates</h4>
          <div class="candidate-list">${candidateRows}</div>
        </div>

        <div id="bonTab-workers" style="display:none;">
          <h4 style="margin-bottom:12px;">Worker Runs</h4>
          <div class="run-list">
            ${workerRows}
          </div>
        </div>

        <div id="bonTab-reviewers" style="display:none;">
          <h4 style="margin-bottom:12px;">Reviewer Runs</h4>
          <div class="run-list">
            ${reviewerRows}
          </div>
        </div>

        <div id="bonTab-final" style="display:none;">
          <h4 style="margin-bottom:12px;">Final Applier</h4>
          <div class="run-list">
            ${finalRows}
          </div>
        </div>
      </div>
    `
    
    content.innerHTML = html
  } catch (e) {
    showToast('Failed to load best-of-n details: ' + e.message, 'error')
    content.innerHTML = `<div style="color:var(--red);">Failed to load best-of-n details: ${e.message}</div>`
  }
}

function showBonTab(tab, taskId) {
  for (const t of ['overview', 'workers', 'reviewers', 'final']) {
    const el = document.getElementById(`bonTab-${t}`)
    if (el) el.style.display = t === tab ? 'block' : 'none'
    const btn = document.querySelector(`.modal-detail-tab:nth-child(${['overview', 'workers', 'reviewers', 'final'].indexOf(t) + 1})`)
    if (btn) btn.className = `modal-detail-tab ${t === tab ? 'active' : ''}`
  }
}

// ---- Toasts ----
function showToast(msg, variant = 'info') {
  addLogEntry(msg, variant)
  const container = document.getElementById('toasts')
  const toast = document.createElement('div')
  toast.className = `toast toast-${variant}`
  toast.textContent = msg
  container.appendChild(toast)
  setTimeout(() => toast.remove(), 5000)
}

  wireModelSearchInputs()
  await loadOptions()
  await loadBranches()
  await loadModels()
  await loadTasks()
  addLogEntry('Kanban UI ready')
  connectWS()
}
init()
