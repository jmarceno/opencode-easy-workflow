<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Workflow Kanban</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
  --text: #e6edf3; --text-dim: #8b949e; --accent: #2f81f7; --accent-hover: #388bfd;
  --green: #238636; --green-hover: #2ea043; --yellow: #d29922; --red: #da3633;
  --orange: #db6d28; --radius: 8px; --shadow: 0 2px 8px rgba(0,0,0,.3); --log-panel-height: 180px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Top bar */
.topbar { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.topbar h1 { font-size: 18px; font-weight: 600; order: 2; }
.btn { padding: 6px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
.btn:hover { border-color: var(--text-dim); }
.btn-primary { background: var(--green); border-color: var(--green); color: #fff; }
.btn-primary:hover { background: var(--green-hover); }
.btn-primary.running { background: var(--red); border-color: var(--red); }
.btn-primary.running:hover { background: #b62324; }
.btn-danger { background: var(--red); border-color: var(--red); color: #fff; }
.btn-danger:hover { background: #b62324; }
.btn-sm { padding: 3px 10px; font-size: 12px; }

/* Board */
.board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 16px; flex: 1; min-height: 0; overflow: hidden; }
.column { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); display: flex; flex-direction: column; min-height: 200px; }
.column-header { padding: 12px 16px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.column-header .count { background: var(--surface2); border-radius: 12px; padding: 2px 8px; font-size: 11px; }
.column-header-main { display: flex; align-items: center; gap: 8px; min-width: 0; }
.column[data-status="template"] .column-header { background: rgba(47,129,247,.12); color: #79c0ff; }
.column[data-status="backlog"] .column-header { background: rgba(210,153,34,.12); color: #f2cc60; }
.column[data-status="executing"] .column-header { background: rgba(35,134,54,.14); color: #7ee787; }
.column[data-status="review"] .column-header { background: rgba(139,92,246,.14); color: #c4b5fd; }
.column[data-status="done"] .column-header { background: rgba(56,189,248,.14); color: #7dd3fc; }
.column-body { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.column-body.drag-over { background: rgba(47,125,247,.08); }

/* Cards */
.card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: default; transition: border-color .15s; }
.card:hover { border-color: var(--text-dim); }
.card.dragging { opacity: .5; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.card-title { font-size: 14px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); text-decoration: none; }
.card-title.has-session { color: var(--accent); cursor: pointer; }
.card-title.has-session:hover { text-decoration: underline; }
.card-idx { font-size: 11px; background: var(--surface); border-radius: 4px; padding: 2px 6px; margin-left: 8px; color: var(--text-dim); flex-shrink: 0; }
.card-actions { display: flex; gap: 4px; margin-left: 8px; }
.card-actions button { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 4px; }
.card-actions button:hover { color: var(--text); background: var(--surface); }
.card-actions button.action-text { font-size: 11px; border: 1px solid var(--border); background: var(--surface); padding: 2px 8px; }
.card-actions button.action-text:hover { border-color: var(--accent); color: var(--accent); }
.card-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.card-inline-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.card-note { font-size: 12px; color: var(--red); margin-top: 8px; }
.badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: var(--surface); color: var(--text-dim); }
.badge-dep { background: rgba(47,125,247,.15); color: var(--accent); }
.badge-review { background: rgba(210,153,34,.15); color: var(--yellow); }
.badge-stuck { background: rgba(218,54,51,.15); color: var(--red); }
.badge-plan { background: rgba(136,98,246,.15); color: #8b5cf6; }
.badge-approval { background: rgba(210,153,34,.15); color: var(--yellow); }
.badge-template { background: rgba(47,125,247,.15); color: var(--accent); }
.badge-bestofn { background: rgba(219,109,40,.15); color: var(--orange); }
.badge-workers { background: rgba(47,129,247,.15); color: #79c0ff; }
.badge-reviewers { background: rgba(136,98,246,.15); color: #8b5cf6; }
.badge-final { background: rgba(35,134,54,.15); color: #7ee787; }
.badge-warning { background: rgba(210,153,34,.15); color: var(--yellow); }

/* Best-of-n config section */
.bon-config-section { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-top: 12px; background: var(--bg); }
.bon-config-section h4 { font-size: 13px; margin-bottom: 10px; color: var(--text); }
.bon-slot-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.bon-slot-row input[type="number"] { width: 60px; }
.bon-slot-row select { flex: 1; }
.bon-slot-row textarea { flex: 1; min-height: 40px; }
.bon-remove-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; padding: 4px; }
.bon-remove-btn:hover { color: #ff7b72; }
.bon-add-btn { background: var(--surface2); border: 1px dashed var(--border); border-radius: 4px; color: var(--text-dim); cursor: pointer; padding: 4px 12px; font-size: 12px; width: 100%; }
.bon-add-btn:hover { border-color: var(--accent); color: var(--accent); }
.bon-validation-error { color: var(--red); font-size: 12px; margin-top: 4px; }

/* Detail modal */
.modal-detail-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.modal-detail-tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--text-dim); border-bottom: 2px solid transparent; }
.modal-detail-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.modal-detail-tab:hover { color: var(--text); }
.run-list { display: flex; flex-direction: column; gap: 8px; }
.run-item { border: 1px solid var(--border); border-radius: 6px; padding: 10px; background: var(--bg); }
.run-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.run-item-phase { font-size: 12px; font-weight: 600; text-transform: uppercase; }
.run-item-phase.worker { color: #79c0ff; }
.run-item-phase.reviewer { color: #8b5cf6; }
.run-item-phase.final_applier { color: #7ee787; }
.run-item-model { font-size: 11px; color: var(--text-dim); }
.run-item-status { font-size: 11px; padding: 2px 6px; border-radius: 4px; }
.run-item-status.pending { background: var(--surface2); color: var(--text-dim); }
.run-item-status.running { background: rgba(47,125,247,.15); color: var(--accent); }
.run-item-status.done { background: rgba(35,134,54,.15); color: #7ee787; }
.run-item-status.failed { background: rgba(218,54,51,.15); color: var(--red); }
.run-item-summary { font-size: 12px; color: var(--text-dim); margin-top: 4px; white-space: pre-wrap; }
.run-item-actions { display: flex; gap: 8px; margin-top: 8px; }
.candidate-list { display: flex; flex-direction: column; gap: 8px; }
.candidate-item { border: 1px solid var(--border); border-radius: 6px; padding: 10px; background: var(--bg); }
.candidate-item.selected { border-color: var(--green); }
.candidate-header { display: flex; justify-content: space-between; align-items: center; }
.candidate-id { font-size: 11px; color: var(--text-dim); }
.candidate-files { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* Collapsible output */
.output-toggle { font-size: 12px; color: var(--accent); cursor: pointer; background: none; border: none; padding: 4px 0; }
.output-toggle:hover { text-decoration: underline; }
.output-content { font-size: 12px; color: var(--text-dim); background: var(--bg); border-radius: 4px; padding: 8px; margin-top: 6px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; display: none; }
.output-content.open { display: block; }

/* Executing spinner */
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--text-dim); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Attention icon */
.attention { color: var(--red); font-size: 14px; margin-left: 4px; }

/* Add task button */
.add-task-btn { width: 100%; padding: 8px; border: 1px dashed var(--border); border-radius: var(--radius); background: none; color: var(--text-dim); cursor: pointer; font-size: 13px; margin-top: auto; }
.add-task-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Delete all button (done panel) */
.delete-all-btn { width: 100%; padding: 8px; border: 1px dashed rgba(218,54,51,.3); border-radius: var(--radius); background: rgba(218,54,51,.08); color: rgba(218,54,51,.8); cursor: pointer; font-size: 13px; margin-top: auto; }
.delete-all-btn:hover { border-color: var(--red); color: var(--red); background: rgba(218,54,51,.14); }

/* Modal overlay */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: flex; align-items: center; justify-content: center; }
.modal-overlay.hidden { display: none; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 520px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow); }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* Form */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: var(--text-dim); }
.label-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.label-row label { margin-bottom: 0; }
.help-btn {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  cursor: help;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  line-height: 1;
  flex-shrink: 0;
}
.help-btn:hover { color: var(--text); border-color: var(--accent); }
.form-group input[type="text"],
.form-group input[type="number"],
.form-group textarea,
.form-group select { width: 100%; padding: 8px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; }
.form-group textarea { min-height: 100px; resize: vertical; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.checkbox-group { display: flex; gap: 16px; flex-wrap: wrap; }
.checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; color: var(--text); }
.checkbox-group input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; }

/* Multi-select for requirements */
.req-list { max-height: 150px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); padding: 6px; }
.req-item { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 4px; font-size: 13px; cursor: pointer; }
.req-item:hover { background: var(--surface2); }
.req-item input { accent-color: var(--accent); }

/* Log panel */
.log-panel { height: var(--log-panel-height); border-top: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; min-height: 120px; }
.log-header { padding: 8px 14px; font-size: 12px; font-weight: 600; color: var(--text-dim); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .4px; display: flex; align-items: center; justify-content: space-between; }
.log-body { flex: 1; overflow-y: auto; padding: 8px 14px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace; font-size: 12px; line-height: 1.5; }
.log-item { color: var(--text-dim); margin-bottom: 4px; white-space: pre-wrap; word-break: break-word; }
.log-item.info { color: var(--text-dim); }
.log-item.success { color: #7ee787; }
.log-item.error { color: #ff7b72; }

/* Toast */
.toast-container { position: fixed; bottom: calc(var(--log-panel-height) + 16px); right: 16px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 10px 16px; border-radius: var(--radius); font-size: 13px; box-shadow: var(--shadow); animation: slideIn .2s ease; }
.toast-error { background: var(--red); color: #fff; }
.toast-success { background: var(--green); color: #fff; }
.toast-info { background: var(--accent); color: #fff; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } }

/* Connection indicator */
.conn-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.conn-status.connected { background: var(--green); }
.conn-status.disconnected { background: var(--red); }
.model-search { margin-bottom: 6px; }

@media (max-width: 980px) {
  .board { grid-template-columns: 1fr; overflow-y: auto; }
  .log-panel { height: 160px; }
}
</style>
</head>
<body>

<div class="topbar">
  <button class="btn btn-primary" id="startBtn" onclick="toggleExecution()">Start</button>
  <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-dim);cursor:pointer;">
    <input type="checkbox" id="showGraphChk" style="accent-color:var(--accent);width:15px;height:15px;">
    Show execution graph
  </label>
  <h1>Easy Workflow Kanban</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="conn-status disconnected" id="connStatus"></div>
    <button class="btn" onclick="openOptionsModal()">Options</button>
  </div>
</div>

<div class="board">
  <div class="column" data-status="template">
    <div class="column-header">
      <div class="column-header-main">
        <span>Templates</span>
        <button class="help-btn" type="button" title="Reusable task blueprints. Keep common prompts and settings here, then deploy them into the backlog when you need a new task." aria-label="Templates column help">?</button>
      </div>
      <span class="count" id="count-template">0</span>
    </div>
    <div class="column-body" id="col-template">
      <button class="add-task-btn" onclick="openTemplateTaskModal()">+ Add Template</button>
    </div>
  </div>
  <div class="column" data-status="backlog">
    <div class="column-header">
      <div class="column-header-main">
        <span>Backlog</span>
        <button class="help-btn" type="button" title="Ready-to-run tasks waiting for execution. Add, edit, reorder, and set dependencies here before starting work." aria-label="Backlog column help">?</button>
      </div>
      <span class="count" id="count-backlog">0</span>
    </div>
    <div class="column-body" id="col-backlog" ondrop="handleDrop(event,'backlog')" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
      <button class="add-task-btn" onclick="openTaskModal()">+ Add Task</button>
    </div>
  </div>
  <div class="column" data-status="executing">
    <div class="column-header">
      <div class="column-header-main">
        <span>Executing</span>
        <button class="help-btn" type="button" title="Tasks currently being worked on by the agent. Use this column to monitor active runs and open their live sessions." aria-label="Executing column help">?</button>
      </div>
      <span class="count" id="count-executing">0</span>
    </div>
    <div class="column-body" id="col-executing"></div>
  </div>
  <div class="column" data-status="review">
    <div class="column-header">
      <div class="column-header-main">
        <span>Review</span>
        <button class="help-btn" type="button" title="Tasks that need human attention. Review outputs here, approve plans, or inspect stuck and failed work before deciding the next step." aria-label="Review column help">?</button>
      </div>
      <span class="count" id="count-review">0</span>
    </div>
    <div class="column-body" id="col-review"></div>
  </div>
  <div class="column" data-status="done">
    <div class="column-header">
      <div class="column-header-main">
        <span>Done</span>
        <button class="help-btn" type="button" title="Completed tasks. Use this column as the final state once the work and any needed review are finished." aria-label="Done column help">?</button>
      </div>
      <span class="count" id="count-done">0</span>
    </div>
    <div class="column-body" id="col-done"></div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay hidden" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="taskModalTitle">Add Task</h2>
      <button class="modal-close" onclick="closeTaskModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="taskId">
      <div class="form-group">
        <div class="label-row">
          <label for="taskName">Name</label>
          <button class="help-btn" type="button" title="Short task title shown on the card. Make it specific enough to identify the work at a glance." aria-label="Task name help">?</button>
        </div>
        <input type="text" id="taskName" placeholder="Task name">
      </div>
      <div class="form-group">
        <div class="label-row">
          <label for="taskPrompt">Prompt</label>
          <button class="help-btn" type="button" title="The main instructions for the agent. Describe the change, bug, or outcome you want it to produce." aria-label="Task prompt help">?</button>
        </div>
        <textarea id="taskPrompt" placeholder="What should this task do?"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <div class="label-row">
            <label for="taskPlanModel">Plan Model</label>
            <button class="help-btn" type="button" title="Model used for planning steps before implementation. Use this when you want a specific model to reason about the approach first." aria-label="Task plan model help">?</button>
          </div>
          <input type="text" id="taskPlanModelSearch" class="model-search" placeholder="Filter models...">
          <select id="taskPlanModel"></select>
        </div>
        <div class="form-group">
          <div class="label-row">
            <label for="taskExecModel">Execution Model</label>
            <button class="help-btn" type="button" title="Model used for the actual implementation work. Set this when execution should run on a different model than planning." aria-label="Task execution model help">?</button>
          </div>
          <input type="text" id="taskExecModelSearch" class="model-search" placeholder="Filter models...">
          <select id="taskExecModel"></select>
        </div>
      </div>
      <div class="form-group">
        <div class="label-row">
          <label for="taskThinkingLevel">Thinking Level</label>
          <button class="help-btn" type="button" title="Controls how much reasoning effort the agent should spend. Higher levels can improve harder tasks but usually take longer." aria-label="Task thinking level help">?</button>
        </div>
        <select id="taskThinkingLevel">
          <option value="default">Default</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group">
        <div class="label-row">
          <label for="taskExecutionStrategy">Execution Strategy</label>
          <button class="help-btn" type="button" title="Standard runs a single execution. Best of N runs multiple candidates in parallel and picks or synthesizes the best result." aria-label="Execution strategy help">?</button>
        </div>
        <select id="taskExecutionStrategy">
          <option value="standard">Standard</option>
          <option value="best_of_n">Best of N</option>
        </select>
      </div>
      <div class="bon-config-section" id="bonConfigSection" style="display:none;">
        <h4>Best of N Configuration</h4>
        <div id="bonValidationErrors"></div>
        
        <div class="form-group">
          <div class="label-row">
            <label>Workers</label>
          </div>
          <div id="bonWorkersList"></div>
          <button type="button" class="bon-add-btn" onclick="addBonWorkerSlot()">+ Add Worker Slot</button>
        </div>
        
        <div class="form-group">
          <div class="label-row">
            <label>Reviewers</label>
          </div>
          <div id="bonReviewersList"></div>
          <button type="button" class="bon-add-btn" onclick="addBonReviewerSlot()">+ Add Reviewer Slot</button>
        </div>
        
        <div class="form-group">
          <div class="label-row">
            <label for="bonFinalApplierModel">Final Applier Model</label>
          </div>
          <input type="text" id="bonFinalApplierModelSearch" class="model-search" placeholder="Filter models...">
          <select id="bonFinalApplierModel"></select>
        </div>
        
        <div class="form-group">
          <div class="label-row">
            <label for="bonFinalApplierSuffix">Final Applier Suffix (optional)</label>
          </div>
          <textarea id="bonFinalApplierSuffix" placeholder="Additional instructions for the final applier..."></textarea>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <div class="label-row">
              <label for="bonSelectionMode">Selection Mode</label>
            </div>
            <select id="bonSelectionMode">
              <option value="pick_best">Pick Best</option>
              <option value="synthesize">Synthesize</option>
              <option value="pick_or_synthesize">Pick or Synthesize</option>
            </select>
          </div>
          <div class="form-group">
            <div class="label-row">
              <label for="bonMinSuccessful">Min Successful Workers</label>
            </div>

<script>
const API = location.origin
let allTasks = []
let allOptions = {}
let availableBranches = []
let currentGitBranch = null
let isExecuting = false
let ws = null
let reconnectTimer = null
let dragTaskId = null
let eventLogs = []
const MAX_LOG_ENTRIES = 500
let bonSummaryByTask = {}
let taskModalMode = 'create'
let taskModalCreateStatus = 'backlog'
let modelCatalog = { providers: [] }
const MODEL_SELECT_FILTERS = [
  { selectId: 'taskPlanModel', searchId: 'taskPlanModelSearch' },
  { selectId: 'taskExecModel', searchId: 'taskExecModelSearch' },
  { selectId: 'optPlanModel', searchId: 'optPlanModelSearch' },
  { selectId: 'optExecModel', searchId: 'optExecModelSearch' },
  { selectId: 'bonFinalApplierModel', searchId: 'bonFinalApplierModelSearch' },
]

let bonWorkers = []
let bonReviewers = []

function addBonWorkerSlot(model = 'default', count = 1, suffix = '') {
  bonWorkers.push({ model, count, suffix })
  renderBonWorkerSlots()
}

function removeBonWorkerSlot(index) {
  bonWorkers.splice(index, 1)
  renderBonWorkerSlots()
}

function renderBonWorkerSlots() {
  const container = document.getElementById('bonWorkersList')
  container.innerHTML = ''
  for (let i = 0; i < bonWorkers.length; i++) {
    const slot = bonWorkers[i]
    const row = document.createElement('div')
    row.className = 'bon-slot-row'
    row.innerHTML = `
      <input type="number" min="1" max="4" value="${slot.count}" onchange="bonWorkers[${i}].count = parseInt(this.value) || 1">
      <select onchange="bonWorkers[${i}].model = this.value">
        ${getModelOptions(slot.model)}
      </select>
      <input type="text" placeholder="Suffix (optional)" value="${slot.suffix || ''}" onchange="bonWorkers[${i}].suffix = this.value">
      <button type="button" class="bon-remove-btn" onclick="removeBonWorkerSlot(${i})">\u2715</button>
    `
    container.appendChild(row)
  }
}

function addBonReviewerSlot(model = 'default', count = 1, suffix = '') {
  bonReviewers.push({ model, count, suffix })
  renderBonReviewerSlots()
}

function removeBonReviewerSlot(index) {
  bonReviewers.splice(index, 1)
  renderBonReviewerSlots()
}

function renderBonReviewerSlots() {
  const container = document.getElementById('bonReviewersList')
  container.innerHTML = ''
  for (let i = 0; i < bonReviewers.length; i++) {
    const slot = bonReviewers[i]
    const row = document.createElement('div')
    row.className = 'bon-slot-row'
    row.innerHTML = `
      <input type="number" min="1" max="4" value="${slot.count}" onchange="bonReviewers[${i}].count = parseInt(this.value) || 1">
      <select onchange="bonReviewers[${i}].model = this.value">
        ${getModelOptions(slot.model)}
      </select>
      <input type="text" placeholder="Suffix (optional)" value="${slot.suffix || ''}" onchange="bonReviewers[${i}].suffix = this.value">
      <button type="button" class="bon-remove-btn" onclick="removeBonReviewerSlot(${i})">\u2715</button>
    `
    container.appendChild(row)
  }
}

function getModelOptions(selected = 'default') {
  let html = '<option value="default">default</option>'
  for (const provider of modelCatalog?.providers || []) {
    for (const model of provider.models || []) {
      const selectedAttr = model.value === selected ? ' selected' : ''
      html += `<option value="${model.value}"${selectedAttr}>${model.label}</option>`
    }
  }
  return html
}

function validateBonConfig() {
  const errors = []
  if (bonWorkers.length === 0) {
    errors.push('Add at least one worker slot')
  }
  const totalWorkers = bonWorkers.reduce((sum, w) => sum + (w.count || 1), 0)
  if (totalWorkers > 8) {
    errors.push(`Total workers (${totalWorkers}) exceeds maximum of 8`)
  }
  const minSuccess = parseInt(document.getElementById('bonMinSuccessful')?.value || '1', 10)
  if (minSuccess > totalWorkers) {
    errors.push('Minimum successful workers cannot exceed total workers')
  }
  return errors
}

function updateBonConfigVisibility() {
  const strategy = document.getElementById('taskExecutionStrategy')?.value || 'standard'
  const section = document.getElementById('bonConfigSection')
  if (section) {
    section.style.display = strategy === 'best_of_n' ? 'block' : 'none'
  }
}

// ---- API helpers ----
async function api(path, method = 'GET', body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } }
  if (body) opts.body = JSON.stringify(body)
  const res = await fetch(API + path, opts)
  if (!res.ok) {
    let errorMessage = `Request failed (${res.status})`
    const responseText = await res.text()
    if (responseText) {
      try {
        const parsed = JSON.parse(responseText)
        if (parsed && typeof parsed.error === 'string' && parsed.error.trim()) {
          errorMessage = parsed.error
        } else {
          errorMessage = responseText
        }
      } catch {
        errorMessage = responseText
      }
    }
    throw new Error(errorMessage)
  }
  return res.status === 204 ? null : res.json()
}

async function loadTasks() {
  try {
    allTasks = await api('/api/tasks')
    await refreshBonSummaries()
    renderBoard()
  } catch (e) { showToast('Failed to load tasks: ' + e.message, 'error') }
}

async function refreshBonSummaries(taskIds) {
  const targetTaskIds = Array.isArray(taskIds)
    ? taskIds
    : allTasks.filter((t) => t.executionStrategy === 'best_of_n').map((t) => t.id)

  if (targetTaskIds.length === 0) {
    bonSummaryByTask = {}
    return
  }

  const uniqueTaskIds = [...new Set(targetTaskIds)]
  const updates = await Promise.all(uniqueTaskIds.map(async (taskId) => {
    try {
      const summary = await api(`/api/tasks/${taskId}/best-of-n-summary`)
      return { taskId, summary }
    } catch (e) {
      addLogEntry(`Failed to refresh best-of-n summary for ${taskId}: ${e.message}`, 'error')
      return { taskId, summary: null }
    }
  }))

  const next = { ...bonSummaryByTask }
  for (const update of updates) {
    if (update.summary) {
      next[update.taskId] = update.summary
    }
  }
  bonSummaryByTask = next
}

async function loadOptions() {
  try {
    allOptions = await api('/api/options')
  } catch (e) { showToast('Failed to load options: ' + e.message, 'error') }
}

async function loadBranches() {
  try {
    const data = await api('/api/branches')
    if (data.error) {
      availableBranches = []
      showToast('Failed to load branches: ' + data.error, 'error')
      return
    }
    const branches = Array.isArray(data.branches) ? data.branches.filter(Boolean) : []
    currentGitBranch = typeof data.current === 'string' && data.current ? data.current : null
    if (currentGitBranch && !branches.includes(currentGitBranch)) branches.unshift(currentGitBranch)
    availableBranches = branches
  } catch (e) {
    availableBranches = []
    showToast('Failed to load branches: ' + e.message, 'error')
  }
}

async function loadModels() {
  try {
    const data = await api('/api/models')
    if (data.error) {
      showToast('Failed to load models: ' + data.error, 'error')
      modelCatalog = { providers: [] }
      return
    }
    modelCatalog = data
  } catch (e) {
    modelCatalog = { providers: [] }
    showToast('Failed to load models: ' + e.message, 'error')
  }
}

function matchesModelFilter(model, provider, query) {
  if (!query) return true
  const q = query.toLowerCase()
  const providerName = (provider.name || provider.id || '').toLowerCase()
  const providerId = (provider.id || '').toLowerCase()
  const modelLabel = (model.label || '').toLowerCase()
  const modelValue = (model.value || '').toLowerCase()
  return providerName.includes(q)
    || providerId.includes(q)
    || modelLabel.includes(q)
    || modelValue.includes(q)
}

function populateModelSelect(selectId, selectedValue, filterText = '') {
  const select = document.getElementById(selectId)
  if (!select) return
  select.innerHTML = ''

  const optDefault = document.createElement('option')
  optDefault.value = 'default'
  optDefault.textContent = 'default'
  select.appendChild(optDefault)

  const filter = (filterText || '').trim()
  let matchedCount = 0
  const providers = modelCatalog?.providers || []
  for (const provider of providers) {
    if (!provider.models || provider.models.length === 0) continue
    const group = document.createElement('optgroup')
    group.label = provider.name || provider.id
    for (const model of provider.models) {
      const shouldInclude = matchesModelFilter(model, provider, filter) || model.value === selectedValue
      if (!shouldInclude) continue
      const opt = document.createElement('option')
      opt.value = model.value
      opt.textContent = model.label
      group.appendChild(opt)
      matchedCount++
    }
    if (group.children.length > 0) select.appendChild(group)
  }

  if (selectedValue && selectedValue !== 'default') {
    let found = false
    for (const provider of providers) {
      for (const model of provider.models || []) {
        if (model.value === selectedValue) {
          select.value = selectedValue
          found = true
          break
        }
      }
      if (found) break
    }
    if (!found) {
      const optUnknown = document.createElement('option')
      optUnknown.value = selectedValue
      optUnknown.textContent = selectedValue + ' (unknown)'
      optUnknown.selected = true
      select.insertBefore(optUnknown, select.firstChild)
    }
  } else {
    select.value = 'default'
  }

  if (filter && matchedCount === 0 && select.value === 'default') {
    const noMatch = document.createElement('option')
    noMatch.disabled = true
    noMatch.textContent = 'No models match filter'
    select.appendChild(noMatch)
  }
}

function wireModelSearchInputs() {
  for (const cfg of MODEL_SELECT_FILTERS) {
    const search = document.getElementById(cfg.searchId)
    const select = document.getElementById(cfg.selectId)
    if (!search || !select) continue
    search.addEventListener('input', () => {
      populateModelSelect(cfg.selectId, select.value || 'default', search.value)
    })
  }
}

function resetModelSelectWithSearch(selectId, searchId, selectedValue) {
  const search = document.getElementById(searchId)
  if (search) search.value = ''
  populateModelSelect(selectId, selectedValue, '')
}

function addLogEntry(message, variant = 'info') {
  const ts = new Date().toLocaleTimeString()
  eventLogs.push({ ts, message, variant })
  if (eventLogs.length > MAX_LOG_ENTRIES) eventLogs = eventLogs.slice(-MAX_LOG_ENTRIES)
  renderLogs()
}

function renderLogs() {
  const container = document.getElementById('eventLog')
  container.innerHTML = ''
  for (const entry of eventLogs) {
    const line = document.createElement('div')
    line.className = `log-item ${entry.variant}`
    line.textContent = `[${entry.ts}] ${entry.message}`
    container.appendChild(line)
  }
  container.scrollTop = container.scrollHeight
}

function clearLogs() {
  eventLogs = []
  renderLogs()
}

function getFallbackBranch() {
  const preferred = allOptions.branch
  if (preferred && availableBranches.includes(preferred)) return preferred
  if (currentGitBranch && availableBranches.includes(currentGitBranch)) return currentGitBranch
  return availableBranches[0] || ''
}

function populateBranchSelect(selectId, selectedBranch) {
  const select = document.getElementById(selectId)
  if (!select) return
  const branches = availableBranches.filter(Boolean)
  const desired = selectedBranch && branches.includes(selectedBranch)
    ? selectedBranch
    : getFallbackBranch()

  select.innerHTML = ''
  if (branches.length === 0) {
    const opt = document.createElement('option')
    opt.value = ''
    opt.textContent = 'No branches found'
    select.appendChild(opt)
    select.value = ''
    return
  }

  for (const branch of branches) {
    const opt = document.createElement('option')
    opt.value = branch
    opt.textContent = branch
    select.appendChild(opt)
  }
  select.value = desired || branches[0]
}

function logTaskTransition(prevTask, nextTask) {
  if (!prevTask || prevTask.status !== nextTask.status) {
    if (nextTask.status === 'executing') addLogEntry(`Task started: ${nextTask.name}`)
    if (nextTask.status === 'done') addLogEntry(`Task completed: ${nextTask.name}`, 'success')
    if (nextTask.status === 'failed' || nextTask.status === 'stuck') {
      const suffix = nextTask.errorMessage ? ` - ${nextTask.errorMessage}` : ''
      addLogEntry(`Task failed: ${nextTask.name}${suffix}`, 'error')
    }
  }
}

// ---- WebSocket ----
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:'
  ws = new WebSocket(`${proto}//${location.host}/ws`)
  ws.onopen = () => {
    document.getElementById('connStatus').className = 'conn-status connected'
    addLogEntry('WebSocket connected')
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null }
  }
  ws.onclose = () => {
    document.getElementById('connStatus').className = 'conn-status disconnected'
    addLogEntry('WebSocket disconnected', 'error')
    reconnectTimer = setTimeout(connectWS, 2000)
  }
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data)
    switch (msg.type) {
      case 'task_created':
        allTasks.push(msg.payload)
        addLogEntry(`Task created: ${msg.payload.name}`)
        renderBoard()
        break
      case 'task_updated':
        const previous = allTasks.find(t => t.id === msg.payload.id)
        const ui = allTasks.findIndex(t => t.id === msg.payload.id)
        if (ui >= 0) allTasks[ui] = msg.payload; else allTasks.push(msg.payload)
        logTaskTransition(previous, msg.payload)
        if (msg.payload.executionStrategy === 'best_of_n') {
          refreshBonSummaries([msg.payload.id]).finally(() => renderBoard())
        } else {
          renderBoard()
        }
        break
      case 'task_deleted':
        addLogEntry(`Task deleted: ${allTasks.find(t => t.id === msg.payload.id)?.name || msg.payload.id}`)
        delete bonSummaryByTask[msg.payload.id]
        allTasks = allTasks.filter(t => t.id !== msg.payload.id); renderBoard(); break
      case 'task_reordered': addLogEntry('Task order updated'); loadTasks(); break
      case 'options_updated': addLogEntry('Options updated'); loadOptions(); break
      case 'execution_started': isExecuting = true; addLogEntry('Execution started'); updateStartBtn(); break
      case 'execution_stopped': isExecuting = false; addLogEntry('Execution stopped'); updateStartBtn(); break
      case 'execution_complete': showToast('All tasks completed!', 'success'); break
      case 'agent_output':
        const t = allTasks.find(t2 => t2.id === msg.payload.taskId)
        if (t) { t.agentOutput = (t.agentOutput || '') + msg.payload.output; renderBoard() }
        break
      case 'error': showToast(msg.payload.message, 'error'); break
      case 'plan_revision_requested':
        loadTasks()
        break
      case 'task_run_created':
      case 'task_run_updated':
      case 'task_candidate_created':
      case 'task_candidate_updated':
        if (msg.payload?.taskId) {
          refreshBonSummaries([msg.payload.taskId]).finally(() => renderBoard())
        }
        break
    }
  }
}

function updateStartBtn() {
  const btn = document.getElementById('startBtn')
  btn.textContent = isExecuting ? 'Stop' : 'Start'
  btn.className = isExecuting ? 'btn btn-primary running' : 'btn btn-primary'
}

function isTaskMutationLocked(task) {
  return isExecuting && task.status !== 'template'
}

function hasPlanOutput(task) {
  return !!(task.agentOutput && task.agentOutput.trim())
}

// ---- Rendering ----
function renderBoard() {
  const groups = { template: [], backlog: [], executing: [], review: [], done: [] }
  for (const t of allTasks) {
    if (t.status === 'template') groups.template.push(t)
    else if (t.status === 'backlog') groups.backlog.push(t)
    else if (t.status === 'executing') groups.executing.push(t)
    else if (t.status === 'review') groups.review.push(t)
    else if (t.status === 'done') groups.done.push(t)
    else if (t.status === 'failed' || t.status === 'stuck') groups.review.push(t)
  }
  for (const [status, tasks] of Object.entries(groups)) {
    tasks.sort((a, b) => a.idx - b.idx)
  }
  for (const status of ['template', 'backlog', 'executing', 'review', 'done']) {
    document.getElementById(`count-${status}`).textContent = groups[status].length
    const col = document.getElementById(`col-${status}`)
    col.innerHTML = ''
    for (const task of groups[status]) {
      col.appendChild(renderCard(task, status))
    }
    if (status === 'template' || status === 'backlog') {
      const btn = document.createElement('button')
      btn.className = 'add-task-btn'
      btn.textContent = status === 'template' ? '+ Add Template' : '+ Add Task'
      btn.onclick = () => status === 'template' ? openTemplateTaskModal() : openTaskModal()
      col.appendChild(btn)
    }
    if (status === 'done') {
      const btn = document.createElement('button')
      btn.className = 'delete-all-btn'
      btn.textContent = 'Delete All'
      btn.onclick = () => deleteAllDone()
      col.appendChild(btn)
    }
  }
}

function renderCard(task, colStatus) {
  const card = document.createElement('div')
  card.className = 'card'
  card.dataset.id = task.id

  if (colStatus === 'backlog') {
    card.draggable = !isTaskMutationLocked(task)
    card.ondragstart = (e) => { dragTaskId = task.id; card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move' }
    card.ondragend = () => { card.classList.remove('dragging'); dragTaskId = null }
  }

  // Header
  const header = document.createElement('div')
  header.className = 'card-header'

  const title = task.sessionUrl && colStatus !== 'backlog' && colStatus !== 'template'
    ? document.createElement('a')
    : document.createElement('span')
  title.className = 'card-title'
  title.textContent = task.name
  if (task.sessionUrl && colStatus !== 'backlog' && colStatus !== 'template') {
    title.href = task.sessionUrl
    title.target = '_blank'
    title.rel = 'noopener noreferrer'
    title.classList.add('has-session')
    title.title = 'Open session in Opencode'
  }
  header.appendChild(title)

  const idx = document.createElement('span')
  idx.className = 'card-idx'
  idx.textContent = `#${task.idx + 1}`
  header.appendChild(idx)

  if (task.status === 'executing') {
    const spinner = document.createElement('span')
    spinner.className = 'spinner'
    header.insertBefore(spinner, title)
  }
  if (task.status === 'stuck') {
    const att = document.createElement('span')
    att.className = 'attention'
    att.textContent = '\u26A0'
    header.appendChild(att)
  }

  // Actions
  const actions = document.createElement('div')
  actions.className = 'card-actions'

  const editBtn = document.createElement('button')
  editBtn.textContent = '\u270F'
  editBtn.title = task.status === 'template'
    ? 'Edit Template'
    : (task.status === 'backlog' ? 'Edit Task' : 'View Task')
  editBtn.onclick = () => openTaskModal(task.id)
  actions.appendChild(editBtn)

  if (task.status === 'template') {
    const deployBtn = document.createElement('button')
    deployBtn.className = 'action-text'
    deployBtn.textContent = 'Deploy'
    deployBtn.title = 'Deploy to Backlog'
    deployBtn.onclick = () => openTemplateDeployModal(task.id)
    actions.appendChild(deployBtn)
  }
  
  // Reset to backlog (stuck, failed, done, review)
  if (!isTaskMutationLocked(task) && (task.status === 'stuck' || task.status === 'failed' || task.status === 'done' || task.status === 'review')) {
    const resetBtn = document.createElement('button')
    resetBtn.textContent = '\u21BB'
    resetBtn.title = 'Reset to Backlog'
    resetBtn.onclick = () => resetTask(task.id)
    actions.appendChild(resetBtn)
  }
  
  // Delete button (not while executing, but always for done tasks)
  if ((!isTaskMutationLocked(task) && task.status !== 'executing') || task.status === 'done') {
    const delBtn = document.createElement('button')
    delBtn.textContent = '\u2715'
    delBtn.title = 'Delete Task'
    delBtn.onclick = () => deleteTask(task.id)
    actions.appendChild(delBtn)
  }
  
  // Mark Done for stuck tasks
  if (task.status === 'stuck') {
    const doneBtn = document.createElement('button')
    doneBtn.textContent = '\u2713'
    doneBtn.title = 'Mark as Done'
    doneBtn.style.color = 'var(--green)'
    doneBtn.onclick = () => markStuckDone(task.id)
    actions.appendChild(doneBtn)
  }

  // Approve Plan button for tasks awaiting approval
  if (!isTaskMutationLocked(task) && task.status === 'review' && task.awaitingPlanApproval && hasPlanOutput(task)) {
    const approveBtn = document.createElement('button')
    approveBtn.className = 'action-text'
    approveBtn.textContent = 'Approve Plan'
    approveBtn.title = 'Approve Plan'
    approveBtn.style.borderColor = 'var(--green)'
    approveBtn.style.color = 'var(--green)'
    approveBtn.onclick = () => approvePlan(task.id)
    actions.appendChild(approveBtn)

    const revisionBtn = document.createElement('button')
    revisionBtn.className = 'action-text'
    revisionBtn.textContent = 'Request Changes'
    revisionBtn.title = 'Request Plan Changes'
    revisionBtn.style.borderColor = 'var(--orange)'
    revisionBtn.style.color = 'var(--orange)'
    revisionBtn.onclick = () => openRevisionModal(task.id)
    actions.appendChild(revisionBtn)
  }

  // Start single task button for backlog tasks
  if (task.status === 'backlog' && !isExecuting) {
    const startBtn = document.createElement('button')
    startBtn.textContent = '\u25B6'
    startBtn.title = 'Start this task and its dependencies'
    startBtn.style.color = 'var(--green)'
    startBtn.onclick = () => openStartSingleModal(task.id, task.name)
    actions.appendChild(startBtn)
  }

  header.appendChild(actions)
  card.appendChild(header)

  // Meta badges
  const meta = document.createElement('div')
  meta.className = 'card-meta'
  if (task.planmode) {
    const b = document.createElement('span')
    b.className = 'badge badge-plan'
    b.textContent = 'plan'
    meta.appendChild(b)
  }
  if (task.status === 'review' && task.awaitingPlanApproval) {
    const b = document.createElement('span')
    b.className = 'badge badge-approval'
    b.textContent = 'plan approval pending'
    meta.appendChild(b)
  }
  if (task.planRevisionCount > 0) {
    const b = document.createElement('span')
    b.className = 'badge badge-warning'
    b.textContent = `revision ${task.planRevisionCount}`
    meta.appendChild(b)
  }
  if (task.status === 'template') {
    const b = document.createElement('span')
    b.className = 'badge badge-template'
    b.textContent = 'template'
    meta.appendChild(b)
  }
  if (task.review) {
    const b = document.createElement('span')
    b.className = task.status === 'stuck' ? 'badge badge-stuck' : 'badge badge-review'
    b.textContent = `review ${task.reviewCount}`
    meta.appendChild(b)
  }
  const depNames = task.requirements
    .map(id => allTasks.find(t => t.id === id)?.name)
    .filter(Boolean)
  if (depNames.length > 0) {
    const b = document.createElement('span')
    b.className = 'badge badge-dep'
    b.textContent = `deps: ${depNames.join(', ')}`
    meta.appendChild(b)
  }
  if (task.errorMessage) {
    const b = document.createElement('span')
    b.className = 'badge badge-stuck'
    b.textContent = 'error'
    meta.appendChild(b)
  }
  if (task.branch) {
    const b = document.createElement('span')
    b.className = 'badge'
    b.textContent = `branch: ${task.branch}`
    meta.appendChild(b)
  }
  if (task.thinkingLevel && task.thinkingLevel !== 'default') {
    const b = document.createElement('span')
    b.className = 'badge'
    b.textContent = `thinking: ${task.thinkingLevel}`
    meta.appendChild(b)
  }
  if (task.deleteWorktree === false) {
    const b = document.createElement('span')
    b.className = 'badge'
    b.textContent = 'keep worktree'
    meta.appendChild(b)
  }
  if (task.executionStrategy === 'best_of_n') {
    const bonSummary = bonSummaryByTask[task.id] || null
    const b = document.createElement('span')
    b.className = 'badge badge-bestofn'
    b.textContent = 'best-of-n'
    meta.appendChild(b)
    if (task.bestOfNSubstage && task.bestOfNSubstage !== 'idle') {
      const stageMap = {
        'workers_running': 'workers running',
        'reviewers_running': 'reviewers running',
        'final_apply_running': 'final apply',
        'blocked_for_manual_review': 'manual review',
        'completed': 'completed',
      }
      const b2 = document.createElement('span')
      b2.className = 'badge badge-' + (task.bestOfNSubstage === 'completed' ? 'final' : 'workers')
      b2.textContent = stageMap[task.bestOfNSubstage] || task.bestOfNSubstage
      meta.appendChild(b2)
    }
    if (bonSummary) {
      const b3 = document.createElement('span')
      b3.className = 'badge badge-workers'
      b3.textContent = `workers ${bonSummary.workersDone}/${bonSummary.workersTotal}`
      meta.appendChild(b3)

      const b4 = document.createElement('span')
      b4.className = 'badge badge-reviewers'
      b4.textContent = `reviewers ${bonSummary.reviewersDone}/${bonSummary.reviewersTotal}`
      meta.appendChild(b4)
    } else {
      if (task.bestOfNConfig?.workers) {
        const totalWorkers = task.bestOfNConfig.workers.reduce((sum, w) => sum + w.count, 0)
        const b3 = document.createElement('span')
        b3.className = 'badge badge-workers'
        b3.textContent = `workers ${totalWorkers}`
        meta.appendChild(b3)
      }
      if (task.bestOfNConfig?.reviewers?.length > 0) {
        const totalReviewers = task.bestOfNConfig.reviewers.reduce((sum, r) => sum + r.count, 0)
        const b4 = document.createElement('span')
        b4.className = 'badge badge-reviewers'
        b4.textContent = `reviewers ${totalReviewers}`
        meta.appendChild(b4)
      }
    }
  }
  if (task.executionStrategy === 'best_of_n' && task.status !== 'template' && task.status !== 'backlog') {
    const viewRunsBtn = document.createElement('button')
    viewRunsBtn.className = 'btn btn-sm'
    viewRunsBtn.textContent = 'View Runs'
    viewRunsBtn.style.marginTop = '4px'
    viewRunsBtn.onclick = (e) => {
      e.stopPropagation()
      openBestOfNDetailModal(task.id)
    }
    card.appendChild(viewRunsBtn)
  }
  if (meta.children.length > 0) card.appendChild(meta)

  if (task.status === 'review' && task.awaitingPlanApproval && !hasPlanOutput(task)) {
    const note = document.createElement('div')
    note.className = 'card-note'
    note.textContent = 'Plan approval is unavailable because no plan output was captured. Reset the task to retry planning.'
    card.appendChild(note)
  }

  if (!isTaskMutationLocked(task) && (task.status === 'review' || task.status === 'failed' || task.status === 'stuck')) {
    const actionBar = document.createElement('div')
    actionBar.className = 'card-inline-actions'

    if (task.status === 'review' && task.awaitingPlanApproval && hasPlanOutput(task)) {
      const approvePlanBtn = document.createElement('button')
      approvePlanBtn.className = 'btn btn-sm btn-primary'
      approvePlanBtn.textContent = 'Approve Plan'
      approvePlanBtn.onclick = () => approvePlan(task.id)
      actionBar.appendChild(approvePlanBtn)

      const requestChangesBtn = document.createElement('button')
      requestChangesBtn.className = 'btn btn-sm'
      requestChangesBtn.textContent = 'Request Changes'
      requestChangesBtn.style.borderColor = 'var(--orange)'
      requestChangesBtn.style.color = 'var(--orange)'
      requestChangesBtn.onclick = () => openRevisionModal(task.id)
      actionBar.appendChild(requestChangesBtn)
    }

    const resetBtn = document.createElement('button')
    resetBtn.className = 'btn btn-sm'
    resetBtn.textContent = 'Reset'
    resetBtn.onclick = () => resetTask(task.id)
    actionBar.appendChild(resetBtn)

    if (task.status === 'stuck') {
      const doneBtn = document.createElement('button')
      doneBtn.className = 'btn btn-sm btn-primary'
      doneBtn.textContent = 'Mark Done'
      doneBtn.onclick = () => markStuckDone(task.id)
      actionBar.appendChild(doneBtn)
    }

    const deleteBtn = document.createElement('button')
    deleteBtn.className = 'btn btn-sm btn-danger'
    deleteBtn.textContent = 'Delete'
    deleteBtn.onclick = () => deleteTask(task.id)
    actionBar.appendChild(deleteBtn)

    card.appendChild(actionBar)
  }

  // Agent output (collapsible)
  if (task.agentOutput && (task.status === 'executing' || task.status === 'review' || task.status === 'done' || task.status === 'stuck' || task.status === 'failed')) {
    const toggle = document.createElement('button')
    toggle.className = 'output-toggle'
    toggle.textContent = '\u25B6 Agent Output'
    const content = document.createElement('div')
    content.className = 'output-content'
    content.textContent = task.agentOutput.slice(-5000)
    toggle.onclick = () => {
      content.classList.toggle('open')
      toggle.textContent = content.classList.contains('open') ? '\u25BC Agent Output' : '\u25B6 Agent Output'
    }
    card.appendChild(toggle)
    card.appendChild(content)
  }

  if (task.completedAt) {
    const date = document.createElement('div')
    date.style.cssText = 'font-size:11px;color:var(--text-dim);margin-top:4px;'
    date.textContent = 'Completed: ' + new Date(task.completedAt * 1000).toLocaleString()
    card.appendChild(date)
  }

  return card
}

// ---- Drag and Drop ----
function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over') }
function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over') }
async function handleDrop(e, targetStatus) {
  e.preventDefault()
  e.currentTarget.classList.remove('drag-over')
  if (!dragTaskId) return

  const task = allTasks.find(t => t.id === dragTaskId)
  if (!task) return
  if (isTaskMutationLocked(task)) {
    showToast('Stop execution before moving tasks.', 'error')
    return
  }
  
  // Prevent dropping on same column
  if (task.status === targetStatus) return
  
  // Define allowed transitions
  const canMoveToDone = ['stuck', 'review'].includes(task.status)
  const canMoveToBacklog = ['stuck', 'failed', 'done', 'review'].includes(task.status)
  const canMoveToReview = ['backlog', 'stuck', 'failed'].includes(task.status)
  
  try {
    if (targetStatus === 'done' && canMoveToDone) {
      if (task.status === 'stuck') {
        await markStuckDone(task.id)
      } else {
        await api(`/api/tasks/${task.id}`, 'PATCH', { 
          status: 'done', 
          completedAt: Math.floor(Date.now() / 1000) 
        })
        showToast('Task moved to Done', 'success')
      }
    } else if (targetStatus === 'backlog' && canMoveToBacklog) {
      await resetTask(task.id)
    } else if (targetStatus === 'review' && canMoveToReview) {
      await api(`/api/tasks/${task.id}`, 'PATCH', { status: 'review' })
      showToast('Task moved to Review', 'success')
    } else {
      showToast(`Cannot move task from ${task.status} to ${targetStatus}`, 'error')
    }
    await loadTasks()
  } catch (e) { 
    showToast('Move failed: ' + e.message, 'error') 
  }
}

// ---- Task CRUD ----
function openTemplateTaskModal() {
  openTaskModal(null, { createStatus: 'template' })
}

function openTemplateDeployModal(taskId) {
  const templateTask = allTasks.find(t => t.id === taskId)
  if (!templateTask || templateTask.status !== 'template') return
  openTaskModal(null, { createStatus: 'backlog', mode: 'deploy', seedTask: templateTask })
}

function openTaskModal(taskId, options = {}) {
  const modal = document.getElementById('taskModal')
  const title = document.getElementById('taskModalTitle')
  const saveBtn = document.getElementById('taskSaveBtn')
  const createStatus = options.createStatus === 'template' ? 'template' : 'backlog'
  const seedTask = options.seedTask || null
  const explicitMode = options.mode || null
  let viewOnly = false
  let currentReqs = []
  let reqExcludeId = null

  bonWorkers = []
  bonReviewers = []

  if (taskId) {
    const task = allTasks.find(t => t.id === taskId)
    if (!task) return
    viewOnly = !(task.status === 'backlog' || task.status === 'template')
    taskModalMode = viewOnly ? 'view' : 'edit'
    taskModalCreateStatus = task.status === 'template' ? 'template' : 'backlog'
    title.textContent = viewOnly ? 'View Task' : (task.status === 'template' ? 'Edit Template' : 'Edit Task')
    document.getElementById('taskId').value = task.id
    document.getElementById('taskName').value = task.name
    document.getElementById('taskPrompt').value = task.prompt
    populateBranchSelect('taskBranch', task.branch || getFallbackBranch())
    document.getElementById('taskBranch').value = task.branch || getFallbackBranch()
    resetModelSelectWithSearch('taskPlanModel', 'taskPlanModelSearch', task.planModel)
    resetModelSelectWithSearch('taskExecModel', 'taskExecModelSearch', task.executionModel)
    document.getElementById('taskPlanmode').checked = task.planmode
    document.getElementById('taskReview').checked = task.review
    document.getElementById('taskAutoCommit').checked = task.autoCommit
    document.getElementById('taskDeleteWorktree').checked = task.deleteWorktree !== false
    document.getElementById('taskThinkingLevel').value = task.thinkingLevel || 'default'
    currentReqs = task.requirements || []
    reqExcludeId = task.id

    if (task.executionStrategy === 'best_of_n' && task.bestOfNConfig) {
      document.getElementById('taskExecutionStrategy').value = 'best_of_n'
      bonWorkers = (task.bestOfNConfig.workers || []).map(w => ({ model: w.model, count: w.count, suffix: w.taskSuffix || '' }))
      bonReviewers = (task.bestOfNConfig.reviewers || []).map(r => ({ model: r.model, count: r.count, suffix: r.taskSuffix || '' }))
      if (task.bestOfNConfig.finalApplier) {
        resetModelSelectWithSearch('bonFinalApplierModel', 'bonFinalApplierModelSearch', task.bestOfNConfig.finalApplier.model)
        document.getElementById('bonFinalApplierSuffix').value = task.bestOfNConfig.finalApplier.taskSuffix || ''
      }
      document.getElementById('bonSelectionMode').value = task.bestOfNConfig.selectionMode || 'pick_best'
      document.getElementById('bonMinSuccessful').value = task.bestOfNConfig.minSuccessfulWorkers || 1
      document.getElementById('bonVerificationCmd').value = task.bestOfNConfig.verificationCommand || ''
    } else {
      document.getElementById('taskExecutionStrategy').value = 'standard'
      resetModelSelectWithSearch('bonFinalApplierModel', 'bonFinalApplierModelSearch', 'default')
      document.getElementById('bonFinalApplierSuffix').value = ''
      document.getElementById('bonSelectionMode').value = 'pick_best'
      document.getElementById('bonMinSuccessful').value = '1'
      document.getElementById('bonVerificationCmd').value = ''
    }
  } else if (seedTask) {
    taskModalMode = explicitMode || 'deploy'
    taskModalCreateStatus = createStatus
    title.textContent = 'Deploy Template'
    document.getElementById('taskId').value = ''
    document.getElementById('taskName').value = seedTask.name
    document.getElementById('taskPrompt').value = seedTask.prompt
    populateBranchSelect('taskBranch', seedTask.branch || getFallbackBranch())
    document.getElementById('taskBranch').value = seedTask.branch || getFallbackBranch()
    resetModelSelectWithSearch('taskPlanModel', 'taskPlanModelSearch', seedTask.planModel || 'default')
    resetModelSelectWithSearch('taskExecModel', 'taskExecModelSearch', seedTask.executionModel || 'default')
    document.getElementById('taskPlanmode').checked = seedTask.planmode
    document.getElementById('taskReview').checked = seedTask.review
    document.getElementById('taskAutoCommit').checked = seedTask.autoCommit
    document.getElementById('taskDeleteWorktree').checked = seedTask.deleteWorktree !== false
    document.getElementById('taskThinkingLevel').value = seedTask.thinkingLevel || 'default'
    currentReqs = seedTask.requirements || []
    reqExcludeId = seedTask.id
    document.getElementById('taskExecutionStrategy').value = 'standard'
    resetModelSelectWithSearch('bonFinalApplierModel', 'bonFinalApplierModelSearch', 'default')
  } else {
    taskModalMode = explicitMode || 'create'
    taskModalCreateStatus = createStatus
    title.textContent = createStatus === 'template' ? 'Add Template' : 'Add Task'
    document.getElementById('taskId').value = ''
    document.getElementById('taskName').value = ''
    document.getElementById('taskPrompt').value = ''
    populateBranchSelect('taskBranch', getFallbackBranch())
    document.getElementById('taskBranch').value = getFallbackBranch()
    resetModelSelectWithSearch('taskPlanModel', 'taskPlanModelSearch', 'default')
    resetModelSelectWithSearch('taskExecModel', 'taskExecModelSearch', 'default')
    document.getElementById('taskPlanmode').checked = false
    document.getElementById('taskReview').checked = true
    document.getElementById('taskAutoCommit').checked = true
    document.getElementById('taskDeleteWorktree').checked = true
    document.getElementById('taskThinkingLevel').value = 'default'
    document.getElementById('taskExecutionStrategy').value = 'standard'
    resetModelSelectWithSearch('bonFinalApplierModel', 'bonFinalApplierModelSearch', 'default')
    document.getElementById('bonFinalApplierSuffix').value = ''
    document.getElementById('bonSelectionMode').value = 'pick_best'
    document.getElementById('bonMinSuccessful').value = '1'
    document.getElementById('bonVerificationCmd').value = ''
  }

  renderBonWorkerSlots()
  renderBonReviewerSlots()
  updateBonConfigVisibility()
  document.getElementById('taskExecutionStrategy').onchange = updateBonConfigVisibility

  saveBtn.style.display = viewOnly ? 'none' : ''
  if (!viewOnly) {
    saveBtn.textContent = taskModalMode === 'deploy'
      ? 'Send to Backlog'
      : (!taskId && taskModalCreateStatus === 'template' ? 'Save Template' : 'Save')
  }

  setTaskModalReadOnly(viewOnly)
  renderReqs(reqExcludeId, { readOnly: viewOnly, currentReqs })
  modal.classList.remove('hidden')
}

function closeTaskModal() {
  taskModalMode = 'create'
  taskModalCreateStatus = 'backlog'
  document.getElementById('taskModal').classList.add('hidden')
}

function setTaskModalReadOnly(readOnly) {
  const body = document.querySelector('#taskModal .modal-body')
  for (const field of body.querySelectorAll('input, textarea, select')) {
    if (field.id === 'taskId') continue
    field.disabled = readOnly
  }
}

function renderReqs(excludeId, options = {}) {
  const readOnly = options.readOnly === true
  const currentReqs = Array.isArray(options.currentReqs)
    ? options.currentReqs
    : (excludeId ? (allTasks.find(t => t.id === excludeId)?.requirements || []) : [])
  const container = document.getElementById('taskReqs')
  container.innerHTML = ''
  const sourceTasks = readOnly
    ? allTasks.filter(t => t.id !== excludeId)
    : allTasks.filter(t => t.status === 'backlog' && t.id !== excludeId)
  if (sourceTasks.length === 0) {
    container.innerHTML = '<div style="font-size:12px;color:var(--text-dim);padding:4px;">No other tasks</div>'
    return
  }
  for (const t of sourceTasks) {
    const item = document.createElement('label')
    item.className = 'req-item'
    const cb = document.createElement('input')
    cb.type = 'checkbox'
    cb.value = t.id
    cb.checked = currentReqs.includes(t.id)
    cb.disabled = readOnly
    item.appendChild(cb)
    item.appendChild(document.createTextNode(` ${t.name} (#${t.idx + 1})`))
    container.appendChild(item)
  }
}

async function saveTask() {
  const id = document.getElementById('taskId').value
  if (id) {
    const task = allTasks.find(t => t.id === id)
    if (task && task.status !== 'backlog' && task.status !== 'template') {
      showToast('Only backlog and template tasks can be edited', 'error')
      return
    }
  }

  const name = document.getElementById('taskName').value.trim()
  const prompt = document.getElementById('taskPrompt').value.trim()
  const branch = document.getElementById('taskBranch').value
  if (!name || !prompt) { showToast('Name and prompt are required', 'error'); return }
  if (!branch) { showToast('Select a valid branch', 'error'); return }

  const executionStrategy = document.getElementById('taskExecutionStrategy').value || 'standard'
  
  if (executionStrategy === 'best_of_n') {
    const errors = validateBonConfig()
    if (errors.length > 0) {
      const errorDiv = document.getElementById('bonValidationErrors')
      errorDiv.innerHTML = errors.map(e => `<div class="bon-validation-error">${e}</div>`).join('')
      showToast('Invalid best-of-n configuration: ' + errors.join('; '), 'error')
      return
    }
  }

  const reqs = Array.from(document.querySelectorAll('#taskReqs input:checked')).map(cb => cb.value)
  const createStatus = taskModalCreateStatus === 'template' ? 'template' : 'backlog'
  const data = {
    name,
    prompt,
    branch,
    planModel: document.getElementById('taskPlanModel').value || 'default',
    executionModel: document.getElementById('taskExecModel').value || 'default',
    planmode: document.getElementById('taskPlanmode').checked,
    review: document.getElementById('taskReview').checked,
    autoCommit: document.getElementById('taskAutoCommit').checked,
    deleteWorktree: document.getElementById('taskDeleteWorktree').checked,
    requirements: reqs,
    thinkingLevel: document.getElementById('taskThinkingLevel').value || 'default',
    executionStrategy,
  }

  if (executionStrategy === 'best_of_n') {
    data.bestOfNConfig = {
      workers: bonWorkers.map(w => ({ model: w.model, count: w.count || 1, taskSuffix: w.suffix || undefined })),
      reviewers: bonReviewers.map(r => ({ model: r.model, count: r.count || 1, taskSuffix: r.suffix || undefined })),
      finalApplier: {
        model: document.getElementById('bonFinalApplierModel').value || 'default',
        taskSuffix: document.getElementById('bonFinalApplierSuffix').value.trim() || undefined,
      },
      selectionMode: document.getElementById('bonSelectionMode').value || 'pick_best',
      minSuccessfulWorkers: parseInt(document.getElementById('bonMinSuccessful').value || '1', 10),
      verificationCommand: document.getElementById('bonVerificationCmd').value.trim() || undefined,
    }
  } else {
    data.bestOfNConfig = null
  }

  try {
    const wasDeploy = !id && taskModalMode === 'deploy'
    if (id) {
      await api(`/api/tasks/${id}`, 'PATCH', data)
    } else {
      await api('/api/tasks', 'POST', { ...data, status: createStatus })
    }
    closeTaskModal()
    if (wasDeploy) {
      showToast('Task sent to Backlog', 'success')
    }
    await loadTasks()
  } catch (e) { showToast('Save failed: ' + e.message, 'error') }
}

async function deleteTask(id) {
  const task = allTasks.find(t => t.id === id)
  const taskName = task ? `"${task.name}"` : 'this task'
  if (!confirm(`Permanently delete ${taskName}? This cannot be undone.`)) return
  try {
    await api(`/api/tasks/${id}`, 'DELETE')
    await loadTasks()
    showToast('Task deleted', 'success')
  } catch (e) { showToast('Delete failed: ' + e.message, 'error') }
}

async function deleteAllDone() {
  const doneTasks = allTasks.filter(t => t.status === 'done')
  if (doneTasks.length === 0) {
    showToast('No done tasks to delete', 'error')
    return
  }
  if (!confirm(`Permanently delete all ${doneTasks.length} done task(s)? This cannot be undone.`)) return
  try {
    for (const task of doneTasks) {
      await api(`/api/tasks/${task.id}`, 'DELETE')
    }
    await loadTasks()
    showToast('All done tasks deleted', 'success')
  } catch (e) { showToast('Delete failed: ' + e.message, 'error') }
}

async function markStuckDone(id) {
  if (!confirm('Mark this stuck task as done? This will complete the task without further review.')) return
  try {
    await api(`/api/tasks/${id}`, 'PATCH', { status: 'done', completedAt: Math.floor(Date.now() / 1000) })
    await loadTasks()
    showToast('Task marked as done', 'success')
  } catch (e) { showToast('Failed: ' + e.message, 'error') }
}

async function resetTask(id) {
  if (!confirm('Reset this task to backlog? This will clear its output, reviews, and error state.')) return
  try {
    await api(`/api/tasks/${id}`, 'PATCH', { 
      status: 'backlog', 
      reviewCount: 0, 
      agentOutput: '', 
      errorMessage: null,
      completedAt: null,
      sessionId: null,
      sessionUrl: null,
      worktreeDir: null,
      executionPhase: 'not_started',
      awaitingPlanApproval: false,
    })
    await loadTasks()
    showToast('Task reset to backlog', 'success')
  } catch (e) { showToast('Reset failed: ' + e.message, 'error') }
}

let approveModalTaskId = null

function openApproveModal(taskId) {
  const task = allTasks.find(t => t.id === taskId)
  if (!task) return
  approveModalTaskId = taskId
  document.getElementById('approveModalTitle').textContent = 'Approve Plan'
  document.getElementById('approveModalTaskName').textContent = task.name
  document.getElementById('approveMessage').value = ''
  document.getElementById('approveModal').classList.remove('hidden')
}

function closeApproveModal() {
  document.getElementById('approveModal').classList.add('hidden')
  approveModalTaskId = null
}

async function confirmApprovePlan() {
  if (!approveModalTaskId) return
  const message = document.getElementById('approveMessage').value
  const taskId = approveModalTaskId
  closeApproveModal()
  try {
    const body = message.trim() ? { message } : {}
    await api(`/api/tasks/${taskId}/approve-plan`, 'POST', body)
    addLogEntry(`Plan approved for task: ${allTasks.find(t => t.id === taskId)?.name || taskId}`)
    await loadTasks()
    showToast('Plan approved', 'success')
  } catch (e) { showToast('Approve plan failed: ' + e.message, 'error') }
}

async function approvePlan(id) {
  openApproveModal(id)
}

let revisionModalTaskId = null

function openRevisionModal(taskId) {
  const task = allTasks.find(t => t.id === taskId)
  if (!task) return
  revisionModalTaskId = taskId
  document.getElementById('revisionModalTaskName').textContent = task.name
  document.getElementById('revisionFeedback').value = ''
  document.getElementById('revisionModal').classList.remove('hidden')
}

function closeRevisionModal() {
  document.getElementById('revisionModal').classList.add('hidden')
  revisionModalTaskId = null
}

async function confirmRequestRevision() {
  if (!revisionModalTaskId) return
  const feedback = document.getElementById('revisionFeedback').value.trim()
  if (!feedback) {
    showToast('Feedback cannot be empty', 'error')
    return
  }
  const taskId = revisionModalTaskId
  closeRevisionModal()
  try {
    await api(`/api/tasks/${taskId}/request-plan-revision`, 'POST', { feedback })
    addLogEntry(`Revision requested for task: ${allTasks.find(t => t.id === taskId)?.name || taskId}`)
    await loadTasks()
    showToast('Revision requested', 'success')
  } catch (e) { showToast('Request revision failed: ' + e.message, 'error') }
}

// ---- Start Single Task ----
let startSingleModalTaskId = null

function openStartSingleModal(taskId, taskName) {
  startSingleModalTaskId = taskId
  const task = allTasks.find(t => t.id === taskId)
  if (!task) return
  document.getElementById('startSingleTaskName').textContent = `Start "${taskName}" and its dependency chain?`

  const depIds = task.requirements.filter(depId => allTasks.some(t => t.id === depId && (t.status === 'backlog' || t.executionPhase === 'implementation_pending' || t.executionPhase === 'plan_revision_pending')))
  const depNames = depIds.map(depId => allTasks.find(t => t.id === depId)?.name).filter(Boolean)

  const depsEl = document.getElementById('startSingleDeps')
  if (depNames.length > 0) {
    depsEl.textContent = `Dependencies to run: ${depNames.join(', ')}`
  } else {
    depsEl.textContent = 'No dependencies to run.'
  }

  document.getElementById('startSingleConfirmBtn').textContent = `Start Task`
  document.getElementById('startSingleModal').classList.remove('hidden')
}

function closeStartSingleModal() {
  document.getElementById('startSingleModal').classList.add('hidden')
  startSingleModalTaskId = null
}

async function confirmStartSingle() {
  if (!startSingleModalTaskId) return
  const taskId = startSingleModalTaskId
  closeStartSingleModal()
  try {
    await api(`/api/tasks/${taskId}/start`, 'POST')
    addLogEntry(`Started single task: ${allTasks.find(t => t.id === taskId)?.name || taskId}`)
    await loadTasks()
    showToast('Task started', 'success')
  } catch (e) { showToast('Start task failed: ' + e.message, 'error') }
}

// ---- Options ----
function openOptionsModal() {
  populateBranchSelect('optBranch', allOptions.branch || getFallbackBranch())
  document.getElementById('optCommitPrompt').value = allOptions.commitPrompt || ''
  document.getElementById('optBranch').value = allOptions.branch || getFallbackBranch()

  resetModelSelectWithSearch('optExecModel', 'optExecModelSearch', allOptions.executionModel || 'default')

function closeOptionsModal() {
  document.getElementById('optionsModal').classList.add('hidden')
}

async function saveOptions() {
  try {
    const branch = document.getElementById('optBranch').value
    if (!branch) {
      showToast('Select a valid default branch', 'error')
      return
    }

    await api('/api/options', 'PUT', {
