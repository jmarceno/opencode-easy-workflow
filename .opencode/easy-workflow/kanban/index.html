<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Workflow Kanban</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
  --text: #e6edf3; --text-dim: #8b949e; --accent: #2f81f7; --accent-hover: #388bfd;
  --green: #238636; --green-hover: #2ea043; --yellow: #d29922; --red: #da3633;
  --orange: #db6d28; --radius: 8px; --shadow: 0 2px 8px rgba(0,0,0,.3); --log-panel-height: 180px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Top bar */
.topbar { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.topbar h1 { font-size: 18px; font-weight: 600; order: 2; }
.btn { padding: 6px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
.btn:hover { border-color: var(--text-dim); }
.btn-primary { background: var(--green); border-color: var(--green); color: #fff; }
.btn-primary:hover { background: var(--green-hover); }
.btn-primary.running { background: var(--red); border-color: var(--red); }
.btn-primary.running:hover { background: #b62324; }
.btn-danger { background: var(--red); border-color: var(--red); color: #fff; }
.btn-danger:hover { background: #b62324; }
.btn-sm { padding: 3px 10px; font-size: 12px; }

/* Board */
.board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; flex: 1; min-height: 0; overflow: hidden; }
.column { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); display: flex; flex-direction: column; min-height: 200px; }
.column-header { padding: 12px 16px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.column-header .count { background: var(--surface2); border-radius: 12px; padding: 2px 8px; font-size: 11px; }
.column-body { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.column-body.drag-over { background: rgba(47,125,247,.08); }

/* Cards */
.card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: default; transition: border-color .15s; }
.card:hover { border-color: var(--text-dim); }
.card.dragging { opacity: .5; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.card-title { font-size: 14px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); text-decoration: none; }
.card-title.has-session { color: var(--accent); cursor: pointer; }
.card-title.has-session:hover { text-decoration: underline; }
.card-idx { font-size: 11px; background: var(--surface); border-radius: 4px; padding: 2px 6px; margin-left: 8px; color: var(--text-dim); flex-shrink: 0; }
.card-actions { display: flex; gap: 4px; margin-left: 8px; }
.card-actions button { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 4px; }
.card-actions button:hover { color: var(--text); background: var(--surface); }
.card-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: var(--surface); color: var(--text-dim); }
.badge-dep { background: rgba(47,125,247,.15); color: var(--accent); }
.badge-review { background: rgba(210,153,34,.15); color: var(--yellow); }
.badge-stuck { background: rgba(218,54,51,.15); color: var(--red); }
.badge-plan { background: rgba(136,98,246,.15); color: #8b5cf6; }

/* Collapsible output */
.output-toggle { font-size: 12px; color: var(--accent); cursor: pointer; background: none; border: none; padding: 4px 0; }
.output-toggle:hover { text-decoration: underline; }
.output-content { font-size: 12px; color: var(--text-dim); background: var(--bg); border-radius: 4px; padding: 8px; margin-top: 6px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; display: none; }
.output-content.open { display: block; }

/* Executing spinner */
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--text-dim); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Attention icon */
.attention { color: var(--red); font-size: 14px; margin-left: 4px; }

/* Add task button */
.add-task-btn { width: 100%; padding: 8px; border: 1px dashed var(--border); border-radius: var(--radius); background: none; color: var(--text-dim); cursor: pointer; font-size: 13px; margin-top: auto; }
.add-task-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Modal overlay */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: flex; align-items: center; justify-content: center; }
.modal-overlay.hidden { display: none; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 520px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow); }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* Form */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: var(--text-dim); }
.form-group input[type="text"],
.form-group input[type="number"],
.form-group textarea,
.form-group select { width: 100%; padding: 8px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; }
.form-group textarea { min-height: 100px; resize: vertical; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.checkbox-group { display: flex; gap: 16px; flex-wrap: wrap; }
.checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; color: var(--text); }
.checkbox-group input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; }

/* Multi-select for requirements */
.req-list { max-height: 150px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); padding: 6px; }
.req-item { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 4px; font-size: 13px; cursor: pointer; }
.req-item:hover { background: var(--surface2); }
.req-item input { accent-color: var(--accent); }

/* Log panel */
.log-panel { height: var(--log-panel-height); border-top: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; min-height: 120px; }
.log-header { padding: 8px 14px; font-size: 12px; font-weight: 600; color: var(--text-dim); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .4px; display: flex; align-items: center; justify-content: space-between; }
.log-body { flex: 1; overflow-y: auto; padding: 8px 14px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace; font-size: 12px; line-height: 1.5; }
.log-item { color: var(--text-dim); margin-bottom: 4px; white-space: pre-wrap; word-break: break-word; }
.log-item.info { color: var(--text-dim); }
.log-item.success { color: #7ee787; }
.log-item.error { color: #ff7b72; }

/* Toast */
.toast-container { position: fixed; bottom: calc(var(--log-panel-height) + 16px); right: 16px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 10px 16px; border-radius: var(--radius); font-size: 13px; box-shadow: var(--shadow); animation: slideIn .2s ease; }
.toast-error { background: var(--red); color: #fff; }
.toast-success { background: var(--green); color: #fff; }
.toast-info { background: var(--accent); color: #fff; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } }

/* Connection indicator */
.conn-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.conn-status.connected { background: var(--green); }
.conn-status.disconnected { background: var(--red); }

@media (max-width: 980px) {
  .board { grid-template-columns: 1fr; overflow-y: auto; }
  .log-panel { height: 160px; }
}
</style>
</head>
<body>

<div class="topbar">
  <button class="btn btn-primary" id="startBtn" onclick="toggleExecution()">Start</button>
  <h1>Easy Workflow Kanban</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="conn-status disconnected" id="connStatus"></div>
    <button class="btn" onclick="openOptionsModal()">Options</button>
  </div>
</div>

<div class="board">
  <div class="column" data-status="backlog">
    <div class="column-header">Backlog <span class="count" id="count-backlog">0</span></div>
    <div class="column-body" id="col-backlog" ondrop="handleDrop(event,'backlog')" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
      <button class="add-task-btn" onclick="openTaskModal()">+ Add Task</button>
    </div>
  </div>
  <div class="column" data-status="executing">
    <div class="column-header">Executing <span class="count" id="count-executing">0</span></div>
    <div class="column-body" id="col-executing"></div>
  </div>
  <div class="column" data-status="review">
    <div class="column-header">Review <span class="count" id="count-review">0</span></span></div>
    <div class="column-body" id="col-review"></div>
  </div>
  <div class="column" data-status="done">
    <div class="column-header">Done <span class="count" id="count-done">0</span></div>
    <div class="column-body" id="col-done"></div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay hidden" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="taskModalTitle">Add Task</h2>
      <button class="modal-close" onclick="closeTaskModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="taskId">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="taskName" placeholder="Task name">
      </div>
      <div class="form-group">
        <label>Prompt</label>
        <textarea id="taskPrompt" placeholder="What should this task do?"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Plan Model</label>
          <input type="text" id="taskPlanModel" placeholder="default">
        </div>
        <div class="form-group">
          <label>Execution Model</label>
          <input type="text" id="taskExecModel" placeholder="default">
        </div>
      </div>
      <div class="form-group">
        <label>Branch</label>
        <select id="taskBranch"></select>
      </div>
      <div class="form-group">
        <div class="checkbox-group">
          <label><input type="checkbox" id="taskPlanmode"> Plan Mode</label>
          <label><input type="checkbox" id="taskReview" checked> Review</label>
          <label><input type="checkbox" id="taskAutoCommit" checked> Auto-commit</label>
          <label><input type="checkbox" id="taskDeleteWorktree" checked> Delete Worktree</label>
        </div>
      </div>
      <div class="form-group">
        <label>Requirements (dependencies)</label>
        <div class="req-list" id="taskReqs"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeTaskModal()">Cancel</button>
      <button class="btn btn-primary" id="taskSaveBtn" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<!-- Options Modal -->
<div class="modal-overlay hidden" id="optionsModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Options</h2>
      <button class="modal-close" onclick="closeOptionsModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Commit Prompt <span style="font-weight:normal;color:var(--text-dim)">({{base_ref}} will be replaced at runtime)</span></label>
        <textarea id="optCommitPrompt" style="min-height:300px;font-family:monospace;font-size:12px" placeholder="Instructions for committing changes..."></textarea>
      </div>
      <div class="form-group">
        <label>Default Branch</label>
        <select id="optBranch"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Plan Model (global)</label>
          <input type="text" id="optPlanModel" placeholder="default">
        </div>
        <div class="form-group">
          <label>Execution Model (global)</label>
          <input type="text" id="optExecModel" placeholder="default">
        </div>
      </div>
      <div class="form-group">
        <label>Pre-execution Command</label>
        <input type="text" id="optCommand" placeholder="e.g. npm install">
      </div>
      <div class="form-group">
        <label>Parallel Tasks</label>
        <input type="number" id="optParallel" min="1" max="10" value="1">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeOptionsModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveOptions()">Save</button>
    </div>
  </div>
</div>

<div class="log-panel">
  <div class="log-header">
    <span>Event Log</span>
    <button class="btn btn-sm" onclick="clearLogs()">Clear</button>
  </div>
  <div class="log-body" id="eventLog"></div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = location.origin
let allTasks = []
let allOptions = {}
let availableBranches = []
let currentGitBranch = null
let isExecuting = false
let ws = null
let reconnectTimer = null
let dragTaskId = null
let eventLogs = []
const MAX_LOG_ENTRIES = 500

// ---- API helpers ----
async function api(path, method = 'GET', body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } }
  if (body) opts.body = JSON.stringify(body)
  const res = await fetch(API + path, opts)
  if (!res.ok) {
    const err = await res.text()
    throw new Error(err)
  }
  return res.status === 204 ? null : res.json()
}

async function loadTasks() {
  try {
    allTasks = await api('/api/tasks')
    renderBoard()
  } catch (e) { showToast('Failed to load tasks: ' + e.message, 'error') }
}

async function loadOptions() {
  try {
    allOptions = await api('/api/options')
  } catch (e) { showToast('Failed to load options: ' + e.message, 'error') }
}

async function loadBranches() {
  try {
    const data = await api('/api/branches')
    const branches = Array.isArray(data.branches) ? data.branches.filter(Boolean) : []
    currentGitBranch = typeof data.current === 'string' && data.current ? data.current : null
    if (currentGitBranch && !branches.includes(currentGitBranch)) branches.unshift(currentGitBranch)
    availableBranches = branches
  } catch (e) {
    availableBranches = []
    showToast('Failed to load branches: ' + e.message, 'error')
  }
}

function addLogEntry(message, variant = 'info') {
  const ts = new Date().toLocaleTimeString()
  eventLogs.push({ ts, message, variant })
  if (eventLogs.length > MAX_LOG_ENTRIES) eventLogs = eventLogs.slice(-MAX_LOG_ENTRIES)
  renderLogs()
}

function renderLogs() {
  const container = document.getElementById('eventLog')
  container.innerHTML = ''
  for (const entry of eventLogs) {
    const line = document.createElement('div')
    line.className = `log-item ${entry.variant}`
    line.textContent = `[${entry.ts}] ${entry.message}`
    container.appendChild(line)
  }
  container.scrollTop = container.scrollHeight
}

function clearLogs() {
  eventLogs = []
  renderLogs()
}

function getFallbackBranch() {
  const preferred = allOptions.branch
  if (preferred && availableBranches.includes(preferred)) return preferred
  if (currentGitBranch && availableBranches.includes(currentGitBranch)) return currentGitBranch
  return availableBranches[0] || ''
}

function populateBranchSelect(selectId, selectedBranch) {
  const select = document.getElementById(selectId)
  if (!select) return
  const branches = availableBranches.filter(Boolean)
  const desired = selectedBranch && branches.includes(selectedBranch)
    ? selectedBranch
    : getFallbackBranch()

  select.innerHTML = ''
  if (branches.length === 0) {
    const opt = document.createElement('option')
    opt.value = ''
    opt.textContent = 'No branches found'
    select.appendChild(opt)
    select.value = ''
    return
  }

  for (const branch of branches) {
    const opt = document.createElement('option')
    opt.value = branch
    opt.textContent = branch
    select.appendChild(opt)
  }
  select.value = desired || branches[0]
}

function logTaskTransition(prevTask, nextTask) {
  if (!prevTask || prevTask.status !== nextTask.status) {
    if (nextTask.status === 'executing') addLogEntry(`Task started: ${nextTask.name}`)
    if (nextTask.status === 'done') addLogEntry(`Task completed: ${nextTask.name}`, 'success')
    if (nextTask.status === 'failed' || nextTask.status === 'stuck') {
      const suffix = nextTask.errorMessage ? ` - ${nextTask.errorMessage}` : ''
      addLogEntry(`Task failed: ${nextTask.name}${suffix}`, 'error')
    }
  }
}

// ---- WebSocket ----
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:'
  ws = new WebSocket(`${proto}//${location.host}/ws`)
  ws.onopen = () => {
    document.getElementById('connStatus').className = 'conn-status connected'
    addLogEntry('WebSocket connected')
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null }
  }
  ws.onclose = () => {
    document.getElementById('connStatus').className = 'conn-status disconnected'
    addLogEntry('WebSocket disconnected', 'error')
    reconnectTimer = setTimeout(connectWS, 2000)
  }
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data)
    switch (msg.type) {
      case 'task_created':
        allTasks.push(msg.payload)
        addLogEntry(`Task created: ${msg.payload.name}`)
        renderBoard()
        break
      case 'task_updated':
        const previous = allTasks.find(t => t.id === msg.payload.id)
        const ui = allTasks.findIndex(t => t.id === msg.payload.id)
        if (ui >= 0) allTasks[ui] = msg.payload; else allTasks.push(msg.payload)
        logTaskTransition(previous, msg.payload)
        renderBoard(); break
      case 'task_deleted':
        addLogEntry(`Task deleted: ${allTasks.find(t => t.id === msg.payload.id)?.name || msg.payload.id}`)
        allTasks = allTasks.filter(t => t.id !== msg.payload.id); renderBoard(); break
      case 'task_reordered': addLogEntry('Task order updated'); loadTasks(); break
      case 'options_updated': addLogEntry('Options updated'); loadOptions(); break
      case 'execution_started': isExecuting = true; addLogEntry('Execution started'); updateStartBtn(); break
      case 'execution_stopped': isExecuting = false; addLogEntry('Execution stopped'); updateStartBtn(); break
      case 'execution_complete': showToast('All tasks completed!', 'success'); break
      case 'agent_output':
        const t = allTasks.find(t2 => t2.id === msg.payload.taskId)
        if (t) { t.agentOutput = (t.agentOutput || '') + msg.payload.output; renderBoard() }
        break
      case 'error': showToast(msg.payload.message, 'error'); break
    }
  }
}

function updateStartBtn() {
  const btn = document.getElementById('startBtn')
  btn.textContent = isExecuting ? 'Stop' : 'Start'
  btn.className = isExecuting ? 'btn btn-primary running' : 'btn btn-primary'
}

// ---- Rendering ----
function renderBoard() {
  const groups = { backlog: [], executing: [], review: [], done: [] }
  for (const t of allTasks) {
    if (t.status === 'backlog') groups.backlog.push(t)
    else if (t.status === 'executing') groups.executing.push(t)
    else if (t.status === 'review') groups.review.push(t)
    else if (t.status === 'done') groups.done.push(t)
    else if (t.status === 'failed' || t.status === 'stuck') groups.review.push(t)
  }
  for (const [status, tasks] of Object.entries(groups)) {
    tasks.sort((a, b) => a.idx - b.idx)
  }
  for (const status of ['backlog', 'executing', 'review', 'done']) {
    document.getElementById(`count-${status}`).textContent = groups[status].length
    const col = document.getElementById(`col-${status}`)
    col.innerHTML = ''
    for (const task of groups[status]) {
      col.appendChild(renderCard(task, status))
    }
    if (status === 'backlog') {
      const btn = document.createElement('button')
      btn.className = 'add-task-btn'
      btn.textContent = '+ Add Task'
      btn.onclick = () => openTaskModal()
      col.appendChild(btn)
    }
  }
}

function renderCard(task, colStatus) {
  const card = document.createElement('div')
  card.className = 'card'
  card.dataset.id = task.id

  if (colStatus === 'backlog') {
    card.draggable = true
    card.ondragstart = (e) => { dragTaskId = task.id; card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move' }
    card.ondragend = () => { card.classList.remove('dragging'); dragTaskId = null }
  }

  // Header
  const header = document.createElement('div')
  header.className = 'card-header'

  const title = task.sessionUrl && colStatus !== 'backlog'
    ? document.createElement('a')
    : document.createElement('span')
  title.className = 'card-title'
  title.textContent = task.name
  if (task.sessionUrl && colStatus !== 'backlog') {
    title.href = task.sessionUrl
    title.target = '_blank'
    title.rel = 'noopener noreferrer'
    title.classList.add('has-session')
    title.title = 'Open session in Opencode'
  }
  header.appendChild(title)

  const idx = document.createElement('span')
  idx.className = 'card-idx'
  idx.textContent = `#${task.idx + 1}`
  header.appendChild(idx)

  if (task.status === 'executing') {
    const spinner = document.createElement('span')
    spinner.className = 'spinner'
    header.insertBefore(spinner, title)
  }
  if (task.status === 'stuck') {
    const att = document.createElement('span')
    att.className = 'attention'
    att.textContent = '\u26A0'
    header.appendChild(att)
  }

  // Actions
  const actions = document.createElement('div')
  actions.className = 'card-actions'

  const editBtn = document.createElement('button')
  editBtn.textContent = '\u270F'
  editBtn.title = task.status === 'backlog' ? 'Edit Task' : 'View Task'
  editBtn.onclick = () => openTaskModal(task.id)
  actions.appendChild(editBtn)
  
  // Reset to backlog (stuck, failed, done, review)
  if (task.status === 'stuck' || task.status === 'failed' || task.status === 'done' || task.status === 'review') {
    const resetBtn = document.createElement('button')
    resetBtn.textContent = '\u21BB'
    resetBtn.title = 'Reset to Backlog'
    resetBtn.onclick = () => resetTask(task.id)
    actions.appendChild(resetBtn)
  }
  
  // Delete button (not while executing)
  if (task.status !== 'executing') {
    const delBtn = document.createElement('button')
    delBtn.textContent = '\u2715'
    delBtn.title = 'Delete Task'
    delBtn.onclick = () => deleteTask(task.id)
    actions.appendChild(delBtn)
  }
  
  // Mark Done for stuck tasks
  if (task.status === 'stuck') {
    const doneBtn = document.createElement('button')
    doneBtn.textContent = '\u2713'
    doneBtn.title = 'Mark as Done'
    doneBtn.style.color = 'var(--green)'
    doneBtn.onclick = () => markStuckDone(task.id)
    actions.appendChild(doneBtn)
  }
  header.appendChild(actions)
  card.appendChild(header)

  // Meta badges
  const meta = document.createElement('div')
  meta.className = 'card-meta'
  if (task.planmode) {
    const b = document.createElement('span')
    b.className = 'badge badge-plan'
    b.textContent = 'plan'
    meta.appendChild(b)
  }
  if (task.review) {
    const b = document.createElement('span')
    b.className = task.status === 'stuck' ? 'badge badge-stuck' : 'badge badge-review'
    b.textContent = `review ${task.reviewCount}`
    meta.appendChild(b)
  }
  const depNames = task.requirements
    .map(id => allTasks.find(t => t.id === id)?.name)
    .filter(Boolean)
  if (depNames.length > 0) {
    const b = document.createElement('span')
    b.className = 'badge badge-dep'
    b.textContent = `deps: ${depNames.join(', ')}`
    meta.appendChild(b)
  }
  if (task.errorMessage) {
    const b = document.createElement('span')
    b.className = 'badge badge-stuck'
    b.textContent = 'error'
    meta.appendChild(b)
  }
  if (task.branch) {
    const b = document.createElement('span')
    b.className = 'badge'
    b.textContent = `branch: ${task.branch}`
    meta.appendChild(b)
  }
  if (task.deleteWorktree === false) {
    const b = document.createElement('span')
    b.className = 'badge'
    b.textContent = 'keep worktree'
    meta.appendChild(b)
  }
  if (meta.children.length > 0) card.appendChild(meta)

  // Agent output (collapsible)
  if (task.agentOutput && (task.status === 'executing' || task.status === 'review' || task.status === 'done' || task.status === 'stuck' || task.status === 'failed')) {
    const toggle = document.createElement('button')
    toggle.className = 'output-toggle'
    toggle.textContent = '\u25B6 Agent Output'
    const content = document.createElement('div')
    content.className = 'output-content'
    content.textContent = task.agentOutput.slice(-5000)
    toggle.onclick = () => {
      content.classList.toggle('open')
      toggle.textContent = content.classList.contains('open') ? '\u25BC Agent Output' : '\u25B6 Agent Output'
    }
    card.appendChild(toggle)
    card.appendChild(content)
  }

  if (task.completedAt) {
    const date = document.createElement('div')
    date.style.cssText = 'font-size:11px;color:var(--text-dim);margin-top:4px;'
    date.textContent = 'Completed: ' + new Date(task.completedAt * 1000).toLocaleString()
    card.appendChild(date)
  }

  return card
}

// ---- Drag and Drop ----
function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over') }
function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over') }
async function handleDrop(e, targetStatus) {
  e.preventDefault()
  e.currentTarget.classList.remove('drag-over')
  if (!dragTaskId) return

  const task = allTasks.find(t => t.id === dragTaskId)
  if (!task) return
  
  // Prevent dropping on same column
  if (task.status === targetStatus) return
  
  // Define allowed transitions
  const canMoveToDone = ['stuck', 'review', 'executing'].includes(task.status)
  const canMoveToBacklog = ['stuck', 'failed', 'done', 'review'].includes(task.status)
  const canMoveToReview = ['backlog', 'stuck', 'failed'].includes(task.status)
  
  try {
    if (targetStatus === 'done' && canMoveToDone) {
      if (task.status === 'stuck') {
        await markStuckDone(task.id)
      } else {
        await api(`/api/tasks/${task.id}`, 'PATCH', { 
          status: 'done', 
          completedAt: Math.floor(Date.now() / 1000) 
        })
        showToast('Task moved to Done', 'success')
      }
    } else if (targetStatus === 'backlog' && canMoveToBacklog) {
      await resetTask(task.id)
    } else if (targetStatus === 'review' && canMoveToReview) {
      await api(`/api/tasks/${task.id}`, 'PATCH', { status: 'review' })
      showToast('Task moved to Review', 'success')
    } else {
      showToast(`Cannot move task from ${task.status} to ${targetStatus}`, 'error')
    }
    await loadTasks()
  } catch (e) { 
    showToast('Move failed: ' + e.message, 'error') 
  }
}

// ---- Task CRUD ----
function openTaskModal(taskId) {
  const modal = document.getElementById('taskModal')
  const title = document.getElementById('taskModalTitle')
  const saveBtn = document.getElementById('taskSaveBtn')
  let viewOnly = false

  if (taskId) {
    const task = allTasks.find(t => t.id === taskId)
    if (!task) return
    viewOnly = task.status !== 'backlog'
    title.textContent = viewOnly ? 'View Task' : 'Edit Task'
    document.getElementById('taskId').value = task.id
    document.getElementById('taskName').value = task.name
    document.getElementById('taskPrompt').value = task.prompt
    populateBranchSelect('taskBranch', task.branch || getFallbackBranch())
    document.getElementById('taskBranch').value = task.branch || getFallbackBranch()
    document.getElementById('taskPlanModel').value = task.planModel
    document.getElementById('taskExecModel').value = task.executionModel
    document.getElementById('taskPlanmode').checked = task.planmode
    document.getElementById('taskReview').checked = task.review
    document.getElementById('taskAutoCommit').checked = task.autoCommit
    document.getElementById('taskDeleteWorktree').checked = task.deleteWorktree !== false
  } else {
    title.textContent = 'Add Task'
    document.getElementById('taskId').value = ''
    document.getElementById('taskName').value = ''
    document.getElementById('taskPrompt').value = ''
    populateBranchSelect('taskBranch', getFallbackBranch())
    document.getElementById('taskBranch').value = getFallbackBranch()
    document.getElementById('taskPlanModel').value = 'default'
    document.getElementById('taskExecModel').value = 'default'
    document.getElementById('taskPlanmode').checked = false
    document.getElementById('taskReview').checked = true
    document.getElementById('taskAutoCommit').checked = true
    document.getElementById('taskDeleteWorktree').checked = true
  }
  saveBtn.style.display = viewOnly ? 'none' : ''
  setTaskModalReadOnly(viewOnly)
  renderReqs(taskId, viewOnly)
  modal.classList.remove('hidden')
}

function closeTaskModal() {
  document.getElementById('taskModal').classList.add('hidden')
}

function setTaskModalReadOnly(readOnly) {
  const body = document.querySelector('#taskModal .modal-body')
  for (const field of body.querySelectorAll('input, textarea, select')) {
    if (field.id === 'taskId') continue
    field.disabled = readOnly
  }
}

function renderReqs(excludeId, readOnly = false) {
  const container = document.getElementById('taskReqs')
  container.innerHTML = ''
  const sourceTasks = readOnly
    ? allTasks.filter(t => t.id !== excludeId)
    : allTasks.filter(t => t.status === 'backlog' && t.id !== excludeId)
  const currentReqs = excludeId ? (allTasks.find(t => t.id === excludeId)?.requirements || []) : []
  if (sourceTasks.length === 0) {
    container.innerHTML = '<div style="font-size:12px;color:var(--text-dim);padding:4px;">No other tasks</div>'
    return
  }
  for (const t of sourceTasks) {
    const item = document.createElement('label')
    item.className = 'req-item'
    const cb = document.createElement('input')
    cb.type = 'checkbox'
    cb.value = t.id
    cb.checked = currentReqs.includes(t.id)
    cb.disabled = readOnly
    item.appendChild(cb)
    item.appendChild(document.createTextNode(` ${t.name} (#${t.idx + 1})`))
    container.appendChild(item)
  }
}

async function saveTask() {
  const id = document.getElementById('taskId').value
  if (id) {
    const task = allTasks.find(t => t.id === id)
    if (task && task.status !== 'backlog') {
      showToast('Only backlog tasks can be edited', 'error')
      return
    }
  }

  const name = document.getElementById('taskName').value.trim()
  const prompt = document.getElementById('taskPrompt').value.trim()
  const branch = document.getElementById('taskBranch').value
  if (!name || !prompt) { showToast('Name and prompt are required', 'error'); return }
  if (!branch) { showToast('Select a valid branch', 'error'); return }

  const reqs = Array.from(document.querySelectorAll('#taskReqs input:checked')).map(cb => cb.value)
  const data = {
    name,
    prompt,
    branch,
    planModel: document.getElementById('taskPlanModel').value.trim() || 'default',
    executionModel: document.getElementById('taskExecModel').value.trim() || 'default',
    planmode: document.getElementById('taskPlanmode').checked,
    review: document.getElementById('taskReview').checked,
    autoCommit: document.getElementById('taskAutoCommit').checked,
    deleteWorktree: document.getElementById('taskDeleteWorktree').checked,
    requirements: reqs,
  }

  try {
    if (id) {
      await api(`/api/tasks/${id}`, 'PATCH', data)
    } else {
      await api('/api/tasks', 'POST', data)
    }
    closeTaskModal()
    await loadTasks()
  } catch (e) { showToast('Save failed: ' + e.message, 'error') }
}

async function deleteTask(id) {
  const task = allTasks.find(t => t.id === id)
  const taskName = task ? `"${task.name}"` : 'this task'
  if (!confirm(`Permanently delete ${taskName}? This cannot be undone.`)) return
  try {
    await api(`/api/tasks/${id}`, 'DELETE')
    await loadTasks()
    showToast('Task deleted', 'success')
  } catch (e) { showToast('Delete failed: ' + e.message, 'error') }
}

async function markStuckDone(id) {
  if (!confirm('Mark this stuck task as done? This will complete the task without further review.')) return
  try {
    await api(`/api/tasks/${id}`, 'PATCH', { status: 'done', completedAt: Math.floor(Date.now() / 1000) })
    await loadTasks()
    showToast('Task marked as done', 'success')
  } catch (e) { showToast('Failed: ' + e.message, 'error') }
}

async function resetTask(id) {
  if (!confirm('Reset this task to backlog? This will clear its output, reviews, and error state.')) return
  try {
    await api(`/api/tasks/${id}`, 'PATCH', { 
      status: 'backlog', 
      reviewCount: 0, 
      agentOutput: '', 
      errorMessage: null,
      completedAt: null,
      sessionId: null,
      sessionUrl: null,
      worktreeDir: null
    })
    await loadTasks()
    showToast('Task reset to backlog', 'success')
  } catch (e) { showToast('Reset failed: ' + e.message, 'error') }
}

// ---- Options ----
function openOptionsModal() {
  populateBranchSelect('optBranch', allOptions.branch || getFallbackBranch())
  document.getElementById('optCommitPrompt').value = allOptions.commitPrompt || ''
  document.getElementById('optBranch').value = allOptions.branch || getFallbackBranch()
  document.getElementById('optPlanModel').value = allOptions.planModel || 'default'
  document.getElementById('optExecModel').value = allOptions.executionModel || 'default'
  document.getElementById('optCommand').value = allOptions.command || ''
  document.getElementById('optParallel').value = allOptions.parallelTasks || 1
  document.getElementById('optionsModal').classList.remove('hidden')
}

function closeOptionsModal() {
  document.getElementById('optionsModal').classList.add('hidden')
}

async function saveOptions() {
  try {
    const branch = document.getElementById('optBranch').value
    if (!branch) {
      showToast('Select a valid default branch', 'error')
      return
    }

    await api('/api/options', 'PUT', {
      commitPrompt: document.getElementById('optCommitPrompt').value,
      branch,
      planModel: document.getElementById('optPlanModel').value,
      executionModel: document.getElementById('optExecModel').value,
      command: document.getElementById('optCommand').value,
      parallelTasks: parseInt(document.getElementById('optParallel').value, 10) || 1,
    })
    closeOptionsModal()
    await loadOptions()
  } catch (e) { showToast('Options save failed: ' + e.message, 'error') }
}

// ---- Execution ----
async function toggleExecution() {
  try {
    if (isExecuting) {
      await api('/api/stop', 'POST')
    } else {
      await api('/api/start', 'POST')
    }
  } catch (e) { showToast('Execution control failed: ' + e.message, 'error') }
}

// ---- Toasts ----
function showToast(msg, variant = 'info') {
  addLogEntry(msg, variant)
  const container = document.getElementById('toasts')
  const toast = document.createElement('div')
  toast.className = `toast toast-${variant}`
  toast.textContent = msg
  container.appendChild(toast)
  setTimeout(() => toast.remove(), 5000)
}

// ---- Init ----
async function init() {
  await loadOptions()
  await loadBranches()
  await loadTasks()
  addLogEntry('Kanban UI ready')
  connectWS()
}
init()
</script>
